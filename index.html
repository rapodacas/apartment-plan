body.light .worker-badge.charlie{background:#6a3a9a;color:#fff}
body.light .worker-badge.vinny{background:#3a9a6a;color:#fff}
body.light .worker-badge.joaquin{background:#9a6a3a;color:#fff}

body.light .modal{background:#fff;border-color:#d0dce8}
body.light .modal h2{color:#2a4a6a}

body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;transition:background .2s,color .2s}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

#app-header{background:linear-gradient(135deg,#1a3a5c,#264d73);color:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #30363d}
#app-header h1{font-size:19px;font-weight:600;cursor:pointer}
.header-right{display:flex;align-items:center;gap:10px;font-size:15px}
#header-user-label{opacity:.85}
#app-header button{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:14px;cursor:pointer}
#app-header button:hover{background:rgba(255,255,255,.2)}

#login-dropdown{position:absolute;top:56px;right:12px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px;width:310px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:150}
#login-dropdown select,#login-dropdown input{width:100%;padding:11px 14px;border:1px solid #30363d;border-radius:6px;font-size:16px;margin-bottom:12px;background:#0d1117;color:#e6edf3}
#login-dropdown button.pin-btn{width:100%;padding:11px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-weight:600}
.login-err{color:#f85149;font-size:15px;margin-bottom:8px}
.login-divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:13px;color:#8b949e}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#30363d}
#g-signin-btn{display:flex;justify-content:center;margin-bottom:6px}

.breadcrumb{padding:12px 18px;font-size:16px;color:#8b949e;background:#161b22;border-bottom:1px solid #21262d}
.breadcrumb span{cursor:pointer;color:#58a6ff}
.breadcrumb span:hover{text-decoration:underline}

.info-card{background:#161b22;margin:14px 16px;border-radius:10px;padding:20px 22px;border:1px solid #21262d}
.info-card h2{font-size:19px;color:#58a6ff;margin-bottom:12px}
.info-card ul{padding-left:22px;font-size:16px;line-height:1.7}
.info-card p{font-size:16px;line-height:1.6}

.summary-bar{display:flex;flex-wrap:wrap;gap:12px;margin:14px 16px}
.summary-stat{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px 18px;text-align:center;min-width:80px;flex:1}
.summary-stat .num{font-size:28px;font-weight:700;color:#58a6ff}
.summary-stat .label{font-size:14px;color:#8b949e}

/* Phase cards */
.phase-card{background:#161b22;margin:14px 16px;border-radius:10px;overflow:hidden;border:1px solid #21262d;cursor:pointer;transition:border-color .15s}
.phase-card:hover{border-color:#58a6ff}
.phase-card-header{background:#1a3a5c;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.phase-card-header h2{font-size:19px;font-weight:600;margin:0}
.phase-card-dates{font-size:15px;opacity:.8}
.phase-card-body{padding:16px 20px;font-size:16px;line-height:1.6}
.phase-stats{display:flex;gap:18px;font-size:15px;color:#8b949e}
.phase-stats strong{color:#58a6ff}
.phase-progress{height:5px;background:#21262d;border-radius:3px;margin-top:10px;overflow:hidden}
.phase-progress-fill{height:100%;background:#3fb950;border-radius:3px}

/* Task cards */
.task-card{background:#161b22;margin:8px 16px;border-radius:8px;overflow:hidden;border:1px solid #21262d;cursor:pointer;transition:border-color .15s}
.task-card:hover{border-color:#58a6ff}
.task-card:nth-child(odd) .task-card-inner{background:#1c2533}
.task-card:nth-child(even) .task-card-inner{background:#161b22}
.task-card-inner{display:flex;align-items:center;padding:14px 18px;gap:14px}
.task-card-date{min-width:72px;font-weight:700;font-size:17px;line-height:1.2}
.task-card-date .day-type{font-size:13px;color:#8b949e;font-weight:400;display:block}
.task-card-work{flex:1;font-size:17px}
.task-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:95px}
.task-status{font-size:13px;padding:4px 10px;border-radius:10px;font-weight:600;cursor:pointer;user-select:none}
.task-status:hover{opacity:.8}
.status-planned{background:#1c2533;color:#8b949e;border:1px solid #30363d}
.status-in-progress{background:#3d2e00;color:#d29922;border:1px solid #d29922}
.status-done{background:#0d2818;color:#3fb950;border:1px solid #3fb950}
.status-overdue{background:#3d1418;color:#f85149;border:1px solid #f85149}
.task-card-workers{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.task-deps{font-size:12px;color:#8b949e;margin-top:3px}

/* Task detail */
.task-detail{margin:14px 16px}
.task-detail-header{background:#1a3a5c;color:#fff;padding:20px 22px;border-radius:10px 10px 0 0}
.task-detail-header h2{font-size:22px;margin:0 0 6px}
.task-detail-header .task-detail-sub{font-size:16px;opacity:.85}
.task-detail-body{background:#161b22;border:1px solid #21262d;border-top:none;border-radius:0 0 10px 10px}
.detail-section{padding:18px 22px;border-bottom:1px solid #21262d}
.detail-section:last-child{border-bottom:none}
.detail-section h3{font-size:17px;color:#58a6ff;margin-bottom:12px;font-weight:600}
.detail-section textarea,.detail-section input[type="text"],.detail-section input[type="date"]{width:100%;padding:12px;border:1px solid #30363d;border-radius:6px;font-size:16px;font-family:inherit;resize:vertical;background:#0d1117;color:#e6edf3}
.detail-section textarea{min-height:80px}

.status-picker{display:flex;gap:8px;flex-wrap:wrap}
.status-picker button{padding:10px 18px;border:2px solid #30363d;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600;background:#0d1117;color:#8b949e}
.status-picker button.active-planned{border-color:#8b949e;background:#1c2533;color:#8b949e}
.status-picker button.active-in-progress{border-color:#d29922;background:#3d2e00;color:#d29922}
.status-picker button.active-done{border-color:#3fb950;background:#0d2818;color:#3fb950}

.mat-pills{display:flex;flex-wrap:wrap;gap:6px}
.mat-pill{display:inline-flex;align-items:center;gap:4px;font-size:14px;padding:5px 12px;border-radius:14px;background:#1c2533;color:#58a6ff;border:1px solid #30363d}
.mat-pill .link-remove{padding:0 2px;font-size:12px}
.link-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #21262d;font-size:16px}
.link-item:last-child{border:none}
.link-remove{color:#f85149;cursor:pointer;font-size:14px;padding:2px 6px}

.worker-badge{font-size:13px;padding:4px 10px;border-radius:10px;font-weight:600;display:inline-block}
.worker-badge.raoul{background:#1a3a5c;color:#58a6ff}
.worker-badge.charlie{background:#3a1a5c;color:#bc8cff}
.worker-badge.vinny{background:#1a5c3a;color:#3fb950}
.worker-badge.joaquin{background:#5c3a1a;color:#d29922}
.worker-toggle{font-size:15px;padding:7px 16px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;cursor:pointer}
.worker-toggle.signed-up{background:#0d2818;color:#3fb950;border-color:#3fb950}

.btn{padding:10px 18px;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.btn-primary{background:#1a3a5c;color:#58a6ff}
.btn-primary:hover{background:#264d73}
.btn-danger{background:#3d1418;color:#f85149}
.btn-sm{padding:6px 12px;font-size:14px}
.btn-warn{background:#3d2e00;color:#d29922}

.dep-tag{display:inline-block;font-size:13px;padding:3px 10px;border-radius:10px;background:#1c2533;color:#58a6ff;margin:2px;cursor:default;border:1px solid #30363d}
.dep-tag.unmet{background:#3d1418;color:#f85149;border-color:#f85149}

/* Push schedule controls */
.push-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.push-controls select,.push-controls input{padding:8px 12px;border:1px solid #30363d;border-radius:6px;font-size:15px;background:#0d1117;color:#e6edf3}

/* Overdue banner */
.overdue-banner{background:#3d1418;border-left:4px solid #f85149;margin:14px 16px;border-radius:0 8px 8px 0;padding:14px 18px;font-size:16px;color:#f85149}
.overdue-banner h3{margin:0 0 10px;font-size:17px}
.overdue-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(248,81,73,.15);gap:8px}
.overdue-item:last-child{border:none}

.app-footer{text-align:center;padding:20px;font-size:14px;color:#8b949e}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:480px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.modal h2{font-size:19px;color:#58a6ff;margin-bottom:14px}
.modal label{display:block;font-size:15px;font-weight:600;margin-bottom:4px;color:#8b949e}
.modal input,.modal select,.modal textarea{width:100%;padding:11px;border:1px solid #30363d;border-radius:6px;font-size:16px;margin-bottom:12px;font-family:inherit;background:#0d1117;color:#e6edf3}
.modal textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:10px}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-weight:600}
.modal-btns .btn-primary{background:#1a3a5c;color:#58a6ff}
.modal-btns .btn-cancel{background:#21262d;color:#8b949e}
</style>
</head>

let DATA,USER=null,VIEW='home',VIEW_PHASE=null,VIEW_TASK=null;

// ── Auth (OAuth2 token client for Drive API access) ──
let ACCESS_TOKEN=null;
let tokenClient=null;

function handleGoogleSignIn(response){
  const payload=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  const mapping=EMAIL_ROLES[payload.email.toLowerCase()];
  if(mapping){USER=mapping.uid;LS.set('auth',USER);LS.set('authMethod','google');LS.set('googleName',payload.name);LS.set('googleEmail',payload.email)}
  else{document.getElementById('login-err').textContent='Email not authorized: '+payload.email;document.getElementById('login-err').classList.remove('hidden');return}
  document.getElementById('login-dropdown').classList.add('hidden');
  render();
}

function initGoogleSignIn(){
  if(typeof google==='undefined'||!google.accounts)return;
  // ID token for identity
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleSignIn,auto_select:false});
  google.accounts.id.renderButton(document.getElementById('g-signin-btn'),{theme:'outline',size:'large',width:268});
  // Token client for Drive API
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:(resp)=>{
      if(resp.access_token){ACCESS_TOKEN=resp.access_token;console.log('Drive access granted')}
    }
  });
}
let _gsiR=0;function waitForGSI(){if(typeof google!=='undefined'&&google.accounts){initGoogleSignIn();return}if(_gsiR++<20)setTimeout(waitForGSI,250)}

// Ensure we have a Drive token (re-request if expired)
function ensureDriveToken(){
  return new Promise((resolve,reject)=>{
    if(ACCESS_TOKEN){resolve(ACCESS_TOKEN);return}
    if(!tokenClient){reject(new Error('Not signed in with Google. Log out and sign in with Google first.'));return}
    tokenClient.callback=(resp)=>{
      if(resp.error){reject(new Error('Drive access denied: '+resp.error));return}
      if(resp.access_token){ACCESS_TOKEN=resp.access_token;resolve(ACCESS_TOKEN)}
      else reject(new Error('No access token received. Check popup blocker.'));
    };
    try{tokenClient.requestAccessToken({prompt:'consent'})}
    catch(e){reject(new Error('Could not open Google consent. Check popup blocker.'))}
  });
}

function navHome(){VIEW='home';VIEW_PHASE=null;VIEW_TASK=null;render()}

// ── Helpers ──
function todayStr(){return new Date().toISOString().slice(0,10)}
function getTask(id){return DATA.tasks.find(t=>t.id===id)}
function getPhases(){const seen=[];DATA.tasks.forEach(t=>{if(!seen.includes(t.phase))seen.push(t.phase)});return seen}
function getTasksForPhase(phase){return DATA.tasks.filter(t=>t.phase===phase).sort((a,b)=>a.order-b.order)}
function getTasksForDate(date){return DATA.tasks.filter(t=>t.scheduledDate===date).sort((a,b)=>a.order-b.order)}
function getEffectiveStatus(task){if(task.status==='done')return'done';if(task.scheduledDate<todayStr())return'overdue';return task.status||'planned'}
function nextAvailableDay(afterDate){return AVAILABLE_DAYS.find(d=>d>afterDate)||null}
function depsMetFor(task){return task.dependsOn.every(depId=>{const dep=getTask(depId);return dep&&dep.status==='done'})}

// ── Schedule Push ──
function pushScheduleFrom(taskId){
  const task=getTask(taskId);if(!task)return;
  // Get all undone tasks scheduled on or after this task's date, sorted by order
  const toMove=DATA.tasks.filter(t=>t.status!=='done'&&t.scheduledDate>=task.scheduledDate).sort((a,b)=>a.order-b.order);
  // Reassign dates sequentially from available days starting after previous day
  let dayIdx=AVAILABLE_DAYS.indexOf(task.scheduledDate);
  if(dayIdx<0)dayIdx=AVAILABLE_DAYS.findIndex(d=>d>=task.scheduledDate);
  // Shift by 1: start from next available day
  dayIdx++;
  toMove.forEach(t=>{
    if(dayIdx<AVAILABLE_DAYS.length){t.scheduledDate=AVAILABLE_DAYS[dayIdx];dayIdx++}
  });
  saveData(DATA);render();
}

function rescheduleTask(taskId,newDate){
  const task=getTask(taskId);if(!task)return;
  task.scheduledDate=newDate;
  saveData(DATA);render();
}

  if(isLoggedIn()){lbl.textContent=(LS.get('googleName',null)||USER.charAt(0).toUpperCase()+USER.slice(1))+(isAdmin()?' (Admin)':'');btn.textContent='Log Out'}
  else{lbl.textContent='';btn.textContent='Log In'}
  const bc=document.getElementById('breadcrumb'),c=document.getElementById('content');
  if(VIEW==='home'){bc.classList.add('hidden');c.innerHTML=renderHome()}
  else if(VIEW==='phase'){bc.classList.remove('hidden');bc.innerHTML=`<span onclick="navHome()">Home</span> / ${esc(VIEW_PHASE)}`;c.innerHTML=renderPhaseView()}
  else if(VIEW==='task'){bc.classList.remove('hidden');const t=getTask(VIEW_TASK);const ph=t?t.phase:'';bc.innerHTML=`<span onclick="navHome()">Home</span> / <span onclick="navPhase('${escAttr(ph)}')">${esc(ph)}</span> / ${esc(t?t.work:'')}`;c.innerHTML=renderTaskView()}
}

  const total=DATA.tasks.length;

      h+=`<div class="overdue-item"><span style="flex:1;cursor:pointer" onclick="navTask('${t.id}')"><strong>${dayLabel(t.scheduledDate)}</strong> — ${esc(t.work)}</span>`;

    h+=`</div>`;

  // Scope
  if(isAdmin()){

  }else{
    h+=`<div class="info-card"><h2>Scope</h2><ul>${DATA.scope.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>`;

    const dates=tasks.map(t=>t.scheduledDate).sort();
    const dateRange=dates.length?dayLabel(dates[0])+'–'+dayLabel(dates[dates.length-1]):'';
    h+=`<div class="phase-card" onclick="navPhase('${escAttr(phase)}')">
      <div class="phase-card-header"><h2>${esc(phase)}</h2><span class="phase-card-dates">${dateRange}</span></div>

  });

  if(isAdmin())h+=`<div style="padding:8px 16px"><button class="btn btn-primary" onclick="addTaskModal()">+ Add Task</button></div>`;

  // Risks
  if(isAdmin()){
    h+=`<div class="info-card"><h2 style="color:#a06828">Risks & Notes</h2><textarea id="risks-edit" style="width:100%;min-height:60px;padding:10px;border:1px solid #d0dce8;border-radius:6px;font-size:14px;font-family:inherit;resize:vertical">${DATA.risks.join('\n')}</textarea><button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="DATA.risks=document.getElementById('risks-edit').value.split('\\n').filter(l=>l.trim());saveData(DATA);render()">Save</button></div>`;
  }else{
    h+=`<div class="info-card"><h2 style="color:#a06828">Risks & Notes</h2><ul>${DATA.risks.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>`;
  }
  h+=`<div class="app-footer">864 Farr Ave, Escondido — Apartment Conversion</div>`;

function renderTaskView(){

  // Status
  h+=`<div class="detail-section"><h3>Status</h3><div class="status-picker">`;

  h+=`</div>`;

      const dep=getTask(depId);
      if(dep){
        const met=dep.status==='done';
        h+=`<span class="dep-tag ${met?'':'unmet'}" onclick="navTask('${depId}')" style="cursor:pointer">${met?'✓':''} ${esc(dep.work.slice(0,30))}${dep.work.length>30?'...':''}</span>`;
      }
    });
  }else h+=`<span style="color:#aaa;font-size:14px">None (can start anytime)</span>`;
  h+=`</div>`;
  if(isAdmin()){
    h+=`<div style="margin-top:8px"><select id="add-dep" style="padding:6px;border:1px solid #d0dce8;border-radius:6px;font-size:13px;width:70%"><option value="">Add dependency...</option>`;
    DATA.tasks.filter(x=>x.id!==t.id&&!t.dependsOn.includes(x.id)).forEach(x=>{
      h+=`<option value="${x.id}">${esc(x.work.slice(0,40))}</option>`;
    });
    h+=`</select> <button class="btn btn-primary btn-sm" onclick="addDep('${t.id}')">Add</button></div>`;
  }
  h+=`</div>`;

  // Workers
  h+=`<div class="detail-section"><h3>Workers</h3><div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">`;
  workers.forEach(w=>h+=`<span class="worker-badge ${w}">${w.charAt(0).toUpperCase()+w.slice(1)}</span>`);
  if(!workers.length)h+=`<span style="color:#aaa;font-size:14px">No one signed up</span>`;
  if(isLoggedIn()&&!isAdmin()){const mine=workers.includes(USER);h+=`<button class="worker-toggle ${mine?'signed-up':''}" onclick="toggleWorker('${t.scheduledDate}')">${mine?'✓ Signed Up':'+ Sign Up'}</button>`}
  h+=`</div></div>`;

  // Materials
  h+=`<div class="detail-section"><h3>Materials</h3>`;
  if(t.materials.length){h+=`<div class="mat-pills">`;t.materials.forEach((m,i)=>{h+=`<span class="mat-pill">${esc(m)}${isAdmin()?`<span class="link-remove" onclick="removeMat('${t.id}',${i})">✕</span>`:''}</span>`});h+=`</div>`}
  else h+=`<p style="color:#aaa;font-size:14px">None</p>`;
  if(isAdmin())h+=`<div style="display:flex;gap:6px;margin-top:8px"><input type="text" id="new-mat" placeholder="Add material..." style="flex:1;padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:14px"><button class="btn btn-primary btn-sm" onclick="addMat('${t.id}')">Add</button></div>`;
  h+=`</div>`;

  // Notes
  h+=`<div class="detail-section"><h3>Notes</h3>`;
  if(isAdmin())h+=`<textarea id="task-notes" onchange="updateTaskField('${t.id}','notes',this.value)">${esc(t.notes||'')}</textarea>`;
  else h+=t.notes?`<p style="font-size:14px;white-space:pre-wrap">${esc(t.notes)}</p>`:`<p style="color:#aaa;font-size:14px">No notes</p>`;
  h+=`</div>`;

  // Media
  h+=`<div class="detail-section"><h3>Photos / Videos / Links</h3>`;
  // Photo thumbnails
  const photos=t.links.filter(l=>l.type==='photo');
  const videos=t.links.filter(l=>l.type==='video');
  const links=t.links.filter(l=>l.type==='link'||(!l.type));
  if(photos.length){
    h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">`;
    photos.forEach((p,i)=>{
      const idx=t.links.indexOf(p);
      h+=`<div style="position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid #ddd">
        <a href="${escAttr(p.viewUrl||p.url)}" target="_blank"><img src="${escAttr(p.url)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.parentElement.innerHTML='📷'"></a>
        ${isAdmin()?`<span onclick="removeLink('${t.id}',${idx})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer">✕</span>`:''}
      </div>`;
    });
    h+=`</div>`;
  }
  if(videos.length){
    videos.forEach(v=>{const idx=t.links.indexOf(v);h+=`<div class="link-item"><span>🎥</span><a href="${escAttr(v.url)}" target="_blank" style="flex:1;font-size:14px">${esc(v.title||'Video')}</a>${isAdmin()?`<span class="link-remove" onclick="removeLink('${t.id}',${idx})">✕</span>`:''}</div>`});
  }
  if(links.length){
    links.forEach(l=>{const idx=t.links.indexOf(l);h+=`<div class="link-item"><span>🔗</span><a href="${escAttr(l.url)}" target="_blank" style="flex:1;font-size:14px">${esc(l.title||l.url)}</a>${isAdmin()?`<span class="link-remove" onclick="removeLink('${t.id}',${idx})">✕</span>`:''}</div>`});
  }
  if(!t.links.length)h+=`<p style="color:#aaa;font-size:14px">None</p>`;

  // Capture buttons (admin + Drive token required)
  if(isAdmin()){
    if(ACCESS_TOKEN){
      h+=`<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="capturePhoto('${t.id}')">📷 Take Photo</button>
        <button class="btn btn-primary btn-sm" onclick="recordVideo('${t.id}')">🎥 Record 5s Video</button>
      </div>`;
    }else{
      h+=`<div style="margin-top:10px;padding:10px 14px;background:#fff3cd;border-radius:6px;font-size:13px;color:#856404;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span>Connect Google Drive to capture photos &amp; videos.</span>
        <button class="btn btn-sm" style="background:#e67e22;color:#fff" onclick="requestDriveAccess()">Connect Drive</button>
      </div>`;
    }
    // Manual link add
    h+=`<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px"><div style="display:flex;gap:6px"><select id="link-type" style="padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:13px;width:100px"><option value="link">Link</option><option value="photo">Photo URL</option><option value="video">Video URL</option></select><input type="text" id="link-url" placeholder="URL..." style="flex:1;padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:14px"></div><div style="display:flex;gap:6px"><input type="text" id="link-title" placeholder="Title..." style="flex:1;padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:14px"><button class="btn btn-primary btn-sm" onclick="addLink('${t.id}')">Add</button></div></div>`;
  }
  h+=`</div>`;

  // Move / Phase / Order
  if(isAdmin()){
    h+=`<div class="detail-section"><h3>Move & Order</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
        <label style="font-size:13px">Phase:</label>
        <select onchange="updateTaskField('${t.id}','phase',this.value);VIEW_PHASE=this.value;render()" style="padding:6px;border:1px solid #d0dce8;border-radius:6px;font-size:13px">`;
    getPhases().forEach(p=>h+=`<option value="${escAttr(p)}" ${p===t.phase?'selected':''}>${esc(p)}</option>`);
    h+=`</select></div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px">Order:</label>
        <input type="number" value="${t.order}" style="width:70px;padding:6px;border:1px solid #d0dce8;border-radius:6px;font-size:13px" onchange="updateTaskField('${t.id}','order',parseInt(this.value));render()">
      </div></div>`;
    h+=`<div class="detail-section" style="border:none"><button class="btn btn-danger" onclick="if(confirm('Delete this task?')){DATA.tasks=DATA.tasks.filter(x=>x.id!=='${t.id}');saveData(DATA);navPhase('${escAttr(t.phase)}')}">Delete Task</button></div>`;
  }

  h+=`</div></div>`;
  return h;
}

// ── Drive Access (user-gesture triggered, won't be popup-blocked) ──
function requestDriveAccess(){
  if(!tokenClient){alert('Sign in with Google first.');return}
  tokenClient.callback=(resp)=>{
    if(resp.access_token){ACCESS_TOKEN=resp.access_token;console.log('Drive access granted');render()}
    else{alert('Drive access was not granted. Please try again and click Allow.')}
  };
  tokenClient.requestAccessToken({prompt:'consent'});
}

// ── Photo/Video Capture & Upload ──
const DRIVE_FOLDER_NAME='ApartmentBuild';
let _driveFolderId=null;

async function getOrCreateFolder(){
  if(_driveFolderId)return _driveFolderId;
  const token=await ensureDriveToken();
  // Search for existing folder
  const searchResp=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FOLDER_NAME}'+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id)`,{headers:{Authorization:'Bearer '+token}});
  const searchData=await searchResp.json();
  if(searchData.files&&searchData.files.length>0){_driveFolderId=searchData.files[0].id;return _driveFolderId}
  // Create folder
  const createResp=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:DRIVE_FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})});
  const createData=await createResp.json();
  _driveFolderId=createData.id;return _driveFolderId;
}

async function uploadToDrive(blob,filename,mimeType){
  const token=await ensureDriveToken();
  const folderId=await getOrCreateFolder();
  // Multipart upload
  const metadata={name:filename,parents:[folderId]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file',blob);
  const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink',{method:'POST',headers:{Authorization:'Bearer '+token},body:form});
  const data=await resp.json();
  if(!data.id)throw new Error('Upload failed: '+JSON.stringify(data));
  // Make viewable by link
  await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({role:'reader',type:'anyone'})});
  return{id:data.id,url:data.webViewLink||`https://drive.google.com/file/d/${data.id}/view`,directUrl:`https://drive.google.com/uc?id=${data.id}`};
}

// Compress photo via canvas
function compressPhoto(file,maxWidth=1920,quality=0.8){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(blob),'image/jpeg',quality);
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

// Record 5-sec video
function recordVideo(taskId){
  showModal(`<h2>Record Video (5 sec)</h2>
    <video id="vid-preview" autoplay playsinline muted style="width:100%;border-radius:8px;background:#000;max-height:300px"></video>
    <p id="vid-status" style="text-align:center;margin:10px 0;font-size:14px;color:#666">Starting camera...</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="stopVideoCapture();hideModal()">Cancel</button>
      <button class="btn-primary" id="vid-record-btn" onclick="startRecording('${taskId}')" disabled>Record</button>
    </div>`);
  startVideoPreview();
}

let _mediaStream=null,_mediaRecorder=null,_videoChunks=[];

async function startVideoPreview(){
  try{
    _mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
    document.getElementById('vid-preview').srcObject=_mediaStream;
    document.getElementById('vid-status').textContent='Ready — tap Record';
    document.getElementById('vid-record-btn').disabled=false;
  }catch(e){document.getElementById('vid-status').textContent='Camera error: '+e.message}
}

function startRecording(taskId){
  _videoChunks=[];
  const options={mimeType:'video/webm;codecs=vp8',videoBitsPerSecond:1000000};
  try{_mediaRecorder=new MediaRecorder(_mediaStream,options)}catch(e){_mediaRecorder=new MediaRecorder(_mediaStream)}
  _mediaRecorder.ondataavailable=e=>{if(e.data.size>0)_videoChunks.push(e.data)};
  _mediaRecorder.onstop=async()=>{
    const blob=new Blob(_videoChunks,{type:'video/webm'});
    document.getElementById('vid-status').textContent='Uploading...';
    document.getElementById('vid-record-btn').disabled=true;
    try{
      const ts=Date.now();
      const result=await uploadToDrive(blob,`video_${taskId}_${ts}.webm`,'video/webm');
      const t=getTask(taskId);
      t.links.push({type:'video',url:result.url,title:`Video ${new Date().toLocaleDateString()}`,driveId:result.id});
      saveData(DATA);
      stopVideoCapture();hideModal();render();
    }catch(e){document.getElementById('vid-status').textContent='Upload failed: '+e.message;document.getElementById('vid-record-btn').disabled=false}
  };
  _mediaRecorder.start();
  document.getElementById('vid-status').textContent='Recording... 5';
  document.getElementById('vid-record-btn').textContent='Recording...';
  document.getElementById('vid-record-btn').disabled=true;
  let countdown=5;
  const intv=setInterval(()=>{countdown--;document.getElementById('vid-status').textContent=countdown>0?`Recording... ${countdown}`:'Stopping...';if(countdown<=0){clearInterval(intv);_mediaRecorder.stop()}},1000);
}

function stopVideoCapture(){
  if(_mediaStream){_mediaStream.getTracks().forEach(t=>t.stop());_mediaStream=null}
  if(_mediaRecorder&&_mediaRecorder.state!=='inactive'){_mediaRecorder.stop();_mediaRecorder=null}
}

// Photo capture (file input trigger)
function capturePhoto(taskId){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=async()=>{
    if(!input.files[0])return;
    showModal(`<h2>Uploading Photo...</h2><p style="text-align:center;font-size:14px;color:#666" id="photo-status">Compressing...</p><div class="modal-btns" style="margin-top:16px"><button class="btn-cancel" onclick="hideModal()">Cancel</button></div>`);
    try{
      // Check Drive token first
      if(!ACCESS_TOKEN){
        document.getElementById('photo-status').textContent='Requesting Drive access...';
        await ensureDriveToken();
      }
      const compressed=await compressPhoto(input.files[0]);
      const sizeKB=Math.round(compressed.size/1024);
      document.getElementById('photo-status').textContent=`Compressed to ${sizeKB}KB. Uploading to Drive...`;
      const ts=Date.now();
      const result=await uploadToDrive(compressed,`photo_${taskId}_${ts}.jpg`,'image/jpeg');
      const t=getTask(taskId);
      t.links.push({type:'photo',url:result.directUrl,title:`Photo ${new Date().toLocaleDateString()}`,driveId:result.id,viewUrl:result.url});
      saveData(DATA);hideModal();render();
    }catch(e){
      const el=document.getElementById('photo-status');
      if(el)el.innerHTML=`<span style="color:#c44">Error: ${esc(e.message||String(e))}</span><br><br>Make sure you allowed Google Drive access when signing in. Try logging out and back in with Google.`;
    }
  };
  input.click();
}

// ── Actions ──
function cycleStatus(taskId){
  if(!isAdmin())return;
  const t=getTask(taskId);if(!t)return;
  const cycle={planned:'in-progress','in-progress':'done',done:'planned'};
  t.status=cycle[t.status||'planned']||'planned';
  if(t.status==='done')t.completedDate=todayStr();
  else t.completedDate=null;
  saveData(DATA);render();
}
function setTaskStatus(taskId,status){
  const t=getTask(taskId);if(!t)return;
  t.status=status;
  t.completedDate=status==='done'?todayStr():null;
  saveData(DATA);render();
}
function updateTaskField(taskId,field,val){const t=getTask(taskId);if(!t)return;t[field]=val;saveData(DATA)}
function toggleWorker(date){
  if(!DATA.workers[date])DATA.workers[date]=[];
  const arr=DATA.workers[date],idx=arr.indexOf(USER);
  if(idx>=0)arr.splice(idx,1);else arr.push(USER);
  saveData(DATA);render();
}
function addMat(taskId){const v=document.getElementById('new-mat').value.trim();if(!v)return;const t=getTask(taskId);t.materials.push(v);saveData(DATA);render()}
function removeMat(taskId,i){const t=getTask(taskId);t.materials.splice(i,1);saveData(DATA);render()}
function addLink(taskId){
  const type=document.getElementById('link-type').value,url=document.getElementById('link-url').value,title=document.getElementById('link-title').value;
  if(!url)return;const t=getTask(taskId);t.links.push({type,url,title});saveData(DATA);render();
}
function removeLink(taskId,i){const t=getTask(taskId);t.links.splice(i,1);saveData(DATA);render()}
function addDep(taskId){const depId=document.getElementById('add-dep').value;if(!depId)return;const t=getTask(taskId);if(!t.dependsOn.includes(depId))t.dependsOn.push(depId);saveData(DATA);render()}

// ── Add Task Modal ──
function addTaskModal(phase){
  const phases=getPhases();
  showModal(`<h2>Add Task</h2>
    <label>Work Description</label><textarea id="md-work" placeholder="What needs to be done..."></textarea>
    <label>Phase</label><select id="md-phase">${phases.map(p=>`<option value="${escAttr(p)}" ${p===phase?'selected':''}>${esc(p)}</option>`).join('')}<option value="__new">+ New Phase...</option></select>
    <div id="md-newphase-wrap" class="hidden"><label>New Phase Name</label><input id="md-newphase" placeholder="Phase 7: ..."></div>
    <label>Scheduled Date</label><input type="date" id="md-date">
    <label>Order (priority number)</label><input type="number" id="md-order" value="${DATA.tasks.length+1}">
    <div class="modal-btns"><button class="btn-cancel" onclick="hideModal()">Cancel</button><button class="btn-primary" onclick="doAddTask()">Add</button></div>`);
  document.getElementById('md-phase').addEventListener('change',function(){
    document.getElementById('md-newphase-wrap').classList.toggle('hidden',this.value!=='__new');
  });
}
function doAddTask(){
  let phase=document.getElementById('md-phase').value;
  if(phase==='__new')phase=document.getElementById('md-newphase').value;
  const work=document.getElementById('md-work').value,date=document.getElementById('md-date').value,order=parseInt(document.getElementById('md-order').value)||DATA.tasks.length+1;
  if(!work||!phase||!date)return;
  _id++;
  DATA.tasks.push({id:'t'+_id,phase,work,scheduledDate:date,completedDate:null,status:'planned',order,dependsOn:[],materials:[],notes:'',links:[]});
  saveData(DATA);hideModal();render();
}

// ── Utils ──
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden')}
function hideModal(){document.getElementById('modal-overlay').classList.add('hidden')}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function escAttr(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/'/g,'&#39;')}

// Events
document.addEventListener('click',e=>{const dd=document.getElementById('login-dropdown');if(!dd.classList.contains('hidden')&&!dd.contains(e.target)&&e.target!==document.getElementById('auth-btn'))dd.classList.add('hidden')});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)hideModal()});

// ── Theme ──
function toggleTheme(){
  const isLight=document.body.classList.toggle('light');
  localStorage.setItem('apt-theme',isLight?'light':'dark');
  updateThemeBtn();
}
function updateThemeBtn(){
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=document.body.classList.contains('light')?'Dark':'Light';
}
function initTheme(){
  const saved=localStorage.getItem('apt-theme');
  if(saved==='light')document.body.classList.add('light');
  updateThemeBtn();
}

// Init
(function(){
  initTheme();
  DATA=loadData();
  const saved=LS.get('auth',null);
  if(saved){const method=LS.get('authMethod',null);if(method==='google'||DATA.pins[saved])USER=saved}
  // Sync _id counter
  DATA.tasks.forEach(t=>{const n=parseInt(t.id.replace('t',''));if(n>_id)_id=n});
  render();waitForGSI();
})();
</script>
