#login-dropdown button.pin-btn{width:100%;padding:10px;background:#2a4a6a;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600}
.login-err{color:#c44;font-size:13px;margin-bottom:8px}

.login-section-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* Breadcrumb */
.breadcrumb{padding:10px 16px;font-size:14px;color:#6a8aaa;background:#e8eef4}

/* ── PHASES LIST VIEW ── */

.status-done{background:#d4edda;color:#155724}

  // 'joaquin@example.com':{uid:'joaquin',role:'worker',name:'Joaquin'},
};

function handleGoogleSignIn(response){
  // Decode JWT payload (base64url)
  const payload=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  const email=payload.email;
  const name=payload.name||email;

  const mapping=EMAIL_ROLES[email.toLowerCase()];
  if(mapping){
    USER=mapping.uid;
    LS.set('auth',USER);
    LS.set('authMethod','google');
    LS.set('googleName',name);
    LS.set('googleEmail',email);
  }else{
    // Unknown email — grant read-only guest access with their name
    USER=null;
    LS.set('auth',null);
    LS.set('authMethod',null);
    const err=document.getElementById('login-err');
    err.textContent='Email not authorized: '+email;
    err.classList.remove('hidden');
    return;
  }
  document.getElementById('login-dropdown').classList.add('hidden');
  document.getElementById('login-err').classList.add('hidden');
  render();
}

function initGoogleSignIn(){
  if(typeof google==='undefined'||!google.accounts)return;
  google.accounts.id.initialize({
    client_id:GOOGLE_CLIENT_ID,
    callback:handleGoogleSignIn,
    auto_select:false,
    cancel_on_tap_outside:true
  });
  google.accounts.id.renderButton(
    document.getElementById('g-signin-btn'),
    {theme:'outline',size:'large',width:268,text:'signin_with',shape:'rectangular'}
  );
}

// Retry init until Google script loads
let _gsiRetries=0;
function waitForGSI(){
  if(typeof google!=='undefined'&&google.accounts){initGoogleSignIn();return}
  if(_gsiRetries++<20)setTimeout(waitForGSI,250);
}

// ── Storage ──
const LS={
  get(k,def){try{const v=localStorage.getItem('apt-'+k);return v?JSON.parse(v):def}catch{return def}},
  set(k,v){localStorage.setItem('apt-'+k,JSON.stringify(v))}
};
function loadData(){
  return{
    pins:LS.get('pins',DEFAULT_PINS),
    scope:LS.get('scope',DEFAULT_SCOPE),
    risks:LS.get('risks',DEFAULT_RISKS),
    phases:LS.get('phases',DEFAULT_PHASES),
    workers:LS.get('workers',{}),
    dayData:LS.get('dayData',{}) // {date: {notes,links,materials,status}}
  };
}
function saveData(d){
  LS.set('pins',d.pins);LS.set('scope',d.scope);LS.set('risks',d.risks);
  LS.set('phases',d.phases);LS.set('workers',d.workers);LS.set('dayData',d.dayData);
}

let DATA,USER=null,VIEW='home',VIEW_PI=null,VIEW_DI=null;

// ── Auth ──
function toggleAuth(){
  if(USER)doLogout();
  else document.getElementById('login-dropdown').classList.toggle('hidden');
}
function doLogin(){
  const uid=document.getElementById('login-user').value;
  const pin=document.getElementById('login-pin').value;
  const err=document.getElementById('login-err');
  err.classList.add('hidden');
  if(!uid){err.textContent='Select a name';err.classList.remove('hidden');return}
  DATA=loadData();
  if(DATA.pins[uid]!==pin){err.textContent='Wrong PIN';err.classList.remove('hidden');return}
  USER=uid;LS.set('auth',uid);
  document.getElementById('login-dropdown').classList.add('hidden');
  document.getElementById('login-pin').value='';
  render();
}
function doLogout(){
  const wasGoogle=LS.get('authMethod',null)==='google';
  LS.set('auth',null);LS.set('authMethod',null);LS.set('googleName',null);LS.set('googleEmail',null);
  USER=null;
  document.getElementById('login-user').value='';
  document.getElementById('login-pin').value='';
  if(wasGoogle&&typeof google!=='undefined'&&google.accounts){
    google.accounts.id.disableAutoSelect();
  }
  render();
}
function isAdmin(){return USER==='raoul'}
function isLoggedIn(){return USER!==null}

// ── Navigation ──
function navHome(){VIEW='home';VIEW_PI=null;VIEW_DI=null;render()}
function navPhase(pi){VIEW='phase';VIEW_PI=pi;VIEW_DI=null;render()}
function navDay(pi,di){VIEW='day';VIEW_PI=pi;VIEW_DI=di;render()}

// ── Day data helpers ──
function getDayExtra(date){
  return DATA.dayData[date]||{notes:'',links:[],materials:[],status:'planned'};
}
function setDayExtra(date,extra){
  DATA.dayData[date]=extra;saveData(DATA);
}

// ── Render ──
function render(){
  DATA=loadData();
  updateHeaderAuth();
  const bc=document.getElementById('breadcrumb');
  const c=document.getElementById('content');

  if(VIEW==='home'){
    bc.classList.add('hidden');
    c.innerHTML=renderHome();
  }else if(VIEW==='phase'){
    bc.classList.remove('hidden');
    bc.innerHTML=`<span onclick="navHome()">Home</span> / ${esc(DATA.phases[VIEW_PI].name)}`;
    c.innerHTML=renderPhaseView(VIEW_PI);
  }else if(VIEW==='day'){
    bc.classList.remove('hidden');
    const p=DATA.phases[VIEW_PI];
    const d=p.days[VIEW_DI];
    bc.innerHTML=`<span onclick="navHome()">Home</span> / <span onclick="navPhase(${VIEW_PI})">${esc(p.name)}</span> / ${esc(d.label)}`;
    c.innerHTML=renderDayView(VIEW_PI,VIEW_DI);
  }
}

function updateHeaderAuth(){
  const lbl=document.getElementById('header-user-label');
  const btn=document.getElementById('auth-btn');
  if(isLoggedIn()){
    const gName=LS.get('googleName',null);
    const method=LS.get('authMethod',null);
    if(method==='google'&&gName){
      lbl.textContent=gName+(isAdmin()?' (Admin)':'');
    }else{
      lbl.textContent=USER.charAt(0).toUpperCase()+USER.slice(1)+(isAdmin()?' (Admin)':'');
    }
    btn.textContent='Log Out';
  }else{
    lbl.textContent='';btn.textContent='Log In';
  }
}

// ── HOME VIEW ──
function renderHome(){
  let h='';
  // Summary
  const totalDays=DATA.phases.reduce((s,p)=>s+p.days.length,0);
  const allDates=DATA.phases.flatMap(p=>p.days.map(d=>d.date));
  const slotsUsed=allDates.reduce((s,dt)=>s+(DATA.workers[dt]||[]).length,0);
  let doneDays=0;allDates.forEach(dt=>{const x=getDayExtra(dt);if(x.status==='done')doneDays++});

  h+=`<div class="summary-bar">
    <div class="summary-stat"><div class="num">${totalDays}</div><div class="label">Work Days</div></div>
    <div class="summary-stat"><div class="num">${DATA.phases.length}</div><div class="label">Phases</div></div>
    <div class="summary-stat"><div class="num">${doneDays}/${totalDays}</div><div class="label">Completed</div></div>
    <div class="summary-stat"><div class="num">${slotsUsed}</div><div class="label">Signups</div></div>`;
  if(isLoggedIn()&&!isAdmin()){
    let my=0;allDates.forEach(dt=>{if((DATA.workers[dt]||[]).includes(USER))my++});
    h+=`<div class="summary-stat"><div class="num">${my}</div><div class="label">My Days</div></div>`;
  }
  h+=`</div>`;

  // Scope
  if(isAdmin()){
    h+=`<div class="info-card"><h2>Scope</h2>
      <textarea id="scope-edit" style="width:100%;min-height:100px;padding:10px;border:1px solid #d0dce8;border-radius:6px;font-size:14px;font-family:inherit;resize:vertical">${DATA.scope.join('\n')}</textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="saveScope()">Save</button></div>`;
  }else{
    h+=`<div class="info-card"><h2>Scope</h2><ul>${DATA.scope.map(s=>`<li>${esc(s)}</li>`).join('')}</ul>
    <p style="margin-top:8px;color:#888;font-size:13px"><strong>Crew:</strong> Raoul + laborer (Mon + off Fri). Target: Sep 30.</p></div>`;
  }

  // Phase cards
  DATA.phases.forEach((p,pi)=>{
    const total=p.days.length;
    let done=0;p.days.forEach(d=>{const x=getDayExtra(d.date);if(x.status==='done')done++});
    const pct=total?Math.round(done/total*100):0;
    const workers=new Set();p.days.forEach(d=>(DATA.workers[d.date]||[]).forEach(w=>workers.add(w)));

    h+=`<div class="phase-card" onclick="navPhase(${pi})">
      <div class="phase-card-header"><h2>${esc(p.name)}</h2><span class="phase-card-dates">${esc(p.dates)}</span></div>
      <div class="phase-card-body">
        <div class="phase-stats"><span><strong>${total}</strong> days</span><span><strong>${done}</strong> done</span><span><strong>${workers.size}</strong> workers</span></div>
        <div class="phase-card-milestone">${esc(p.milestone)}</div>
        <div class="phase-progress"><div class="phase-progress-fill" style="width:${pct}%"></div></div>
      </div></div>`;
  });

  if(isAdmin()){
    h+=`<div style="padding:8px 16px"><button class="btn btn-primary" onclick="addPhaseModal()">+ Add Phase</button></div>`;
  }

  // Risks
  if(isAdmin()){
    h+=`<div class="info-card"><h2 style="color:#a06828">Risks & Notes</h2>
      <textarea id="risks-edit" style="width:100%;min-height:80px;padding:10px;border:1px solid #d0dce8;border-radius:6px;font-size:14px;font-family:inherit;resize:vertical">${DATA.risks.join('\n')}</textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="saveRisks()">Save</button></div>`;
  }else{
    h+=`<div class="info-card"><h2 style="color:#a06828">Risks & Notes</h2><ul>${DATA.risks.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>`;
  }

  h+=`<div class="app-footer">864 Farr Ave, Escondido — Apartment Conversion Project</div>`;
  return h;
}

// ── PHASE VIEW ──
function renderPhaseView(pi){
  const p=DATA.phases[pi];
  let h='';

  // Phase materials
  if(p.materials&&p.materials.length){
    h+=`<div class="info-card"><h2>Materials — ${esc(p.name)}</h2><ul class="materials-list">`;
    p.materials.forEach((m,mi)=>{
      h+=`<li><span style="font-size:14px">${esc(m)}</span></li>`;
    });
    h+=`</ul></div>`;
  }

  // Day cards
  p.days.forEach((d,di)=>{
    const extra=getDayExtra(d.date);

    const statusClass='status-'+(extra.status||'planned');

    h+=`<div class="day-card" onclick="navDay(${pi},${di})"><div class="day-card-inner">
      <div class="day-card-date">${esc(d.label)}${d.type?`<span class="day-type">${esc(d.type)}</span>`:''}</div>
      <div class="day-card-work">${esc(d.work)}</div>
      <div class="day-card-right">
        <span class="day-card-status ${statusClass}">${extra.status||'planned'}</span>

  });

  }

  h+=`<div class="info-card"><div class="phase-card-milestone" style="font-size:15px">${esc(p.milestone)}</div></div>`;
  return h;
}

// ── DAY DETAIL VIEW ──
function renderDayView(pi,di){
  const p=DATA.phases[pi];
  const d=p.days[di];
  const extra=getDayExtra(d.date);
  const assigned=DATA.workers[d.date]||[];
  let h='';

  h+=`<div class="day-detail">
    <div class="day-detail-header">
      <h2>${esc(d.label)} — ${esc(d.work)}</h2>
      <div class="day-detail-sub">${esc(p.name)} · ${d.type?esc(d.type)+' · ':''}${d.date}</div>
    </div>
    <div class="day-detail-body">`;

  // Status
  h+=`<div class="detail-section"><h3>Status</h3><div class="status-picker">`;
  ['planned','in-progress','done'].forEach(s=>{
    const active=(extra.status||'planned')===s?` active-${s}`:'';
    const label=s.charAt(0).toUpperCase()+s.slice(1);
    if(isAdmin()){
      h+=`<button class="${active}" onclick="setStatus('${d.date}','${s}')">${label}</button>`;
    }else{
      h+=`<button class="${active}" disabled>${label}</button>`;
    }
  });
  h+=`</div></div>`;

  // Work description (admin editable)
  h+=`<div class="detail-section"><h3>Work</h3>`;
  if(isAdmin()){
    h+=`<input type="text" id="day-work-edit" value="${escAttr(d.work)}" onchange="updateWork(${pi},${di},this.value)">`;
  }else{
    h+=`<p style="font-size:15px">${esc(d.work)}</p>`;
  }
  h+=`</div>`;

  // Workers
  h+=`<div class="detail-section"><h3>Workers</h3><div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">`;
  assigned.forEach(w=>{
    h+=`<span class="worker-badge ${w}">${w.charAt(0).toUpperCase()+w.slice(1)}</span>`;
  });
  if(assigned.length===0) h+=`<span style="color:#aaa;font-size:14px">No one signed up yet</span>`;
  if(isLoggedIn()&&!isAdmin()){
    const mine=assigned.includes(USER);
    h+=`<button class="worker-toggle ${mine?'signed-up':''}" onclick="toggleWorker('${d.date}')">${mine?'✓ Signed Up':'+ Sign Up'}</button>`;
  }
  h+=`</div></div>`;

  // Materials for this day
  const dayMats=d.materials||[];
  if(dayMats.length||isAdmin()){
    h+=`<div class="detail-section"><h3>Materials Needed</h3>`;
    if(dayMats.length){
      h+=`<ul class="materials-list">`;
      dayMats.forEach((m,mi)=>{
        h+=`<li><span class="mat-text" style="font-size:14px">${esc(m)}</span>`;
        if(isAdmin()) h+=`<span class="link-remove" onclick="removeDayMaterial(${pi},${di},${mi})">✕</span>`;
        h+=`</li>`;
      });
      h+=`</ul>`;
    }else{
      h+=`<p style="color:#aaa;font-size:14px">None listed</p>`;
    }
    if(isAdmin()){
      h+=`<div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="new-mat" placeholder="Add material..." style="flex:1;padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:14px">
        <button class="btn btn-primary btn-sm" onclick="addDayMaterial(${pi},${di})">Add</button></div>`;
    }
    h+=`</div>`;
  }

  // Notes
  h+=`<div class="detail-section"><h3>Notes</h3>`;
  if(isAdmin()){
    h+=`<textarea id="day-notes" onchange="saveNotes('${d.date}',this.value)">${esc(extra.notes||'')}</textarea>`;
    // Also show default notes from data
    if(d.notes) h+=`<p style="margin-top:6px;font-size:13px;color:#6a8aaa"><em>${esc(d.notes)}</em></p>`;
  }else{
    const allNotes=(extra.notes||'')+(d.notes?'\n'+d.notes:'');
    h+=allNotes.trim()?`<p style="font-size:14px;white-space:pre-wrap">${esc(allNotes.trim())}</p>`:`<p style="color:#aaa;font-size:14px">No notes</p>`;
  }
  h+=`</div>`;

  // Links / Photos / Videos
  const links=extra.links||[];
  h+=`<div class="detail-section"><h3>Photos / Videos / Links</h3>`;
  if(links.length){
    links.forEach((lnk,li)=>{
      const icon=lnk.type==='photo'?'📷':lnk.type==='video'?'🎥':'🔗';
      h+=`<div class="link-item">
        <span class="link-icon">${icon}</span>
        <a href="${escAttr(lnk.url)}" target="_blank" rel="noopener" style="flex:1;font-size:14px">${esc(lnk.title||lnk.url)}</a>`;
      if(isAdmin()) h+=`<span class="link-remove" onclick="removeLink('${d.date}',${li})">✕</span>`;
      h+=`</div>`;
    });
  }else{
    h+=`<p style="color:#aaa;font-size:14px">None added</p>`;
  }
  if(isAdmin()){
    h+=`<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;gap:6px">
        <select id="link-type" style="padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:13px;width:100px">
          <option value="link">Link</option><option value="photo">Photo</option><option value="video">Video</option>
        </select>
        <input type="text" id="link-url" placeholder="URL..." style="flex:1;padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:14px">
      </div>
      <div style="display:flex;gap:6px">
        <input type="text" id="link-title" placeholder="Title (optional)..." style="flex:1;padding:8px;border:1px solid #d0dce8;border-radius:6px;font-size:14px">
        <button class="btn btn-primary btn-sm" onclick="addLink('${d.date}')">Add</button>
      </div></div>`;
  }
  h+=`</div>`;

  // Admin: delete day
  if(isAdmin()){
    h+=`<div class="detail-section" style="border:none"><button class="btn btn-danger" onclick="removeDayPrompt(${pi},${di})">Delete This Day</button></div>`;
  }

  h+=`</div></div>`;
  return h;
}

// ── Actions ──
function saveScope(){
  DATA.scope=document.getElementById('scope-edit').value.split('\n').filter(l=>l.trim());
  saveData(DATA);render();
}
function saveRisks(){
  DATA.risks=document.getElementById('risks-edit').value.split('\n').filter(l=>l.trim());
  saveData(DATA);render();
}
function updateWork(pi,di,val){
  DATA.phases[pi].days[di].work=val;saveData(DATA);
}
function setStatus(date,status){
  const extra=getDayExtra(date);extra.status=status;setDayExtra(date,extra);render();
}
function saveNotes(date,val){
  const extra=getDayExtra(date);extra.notes=val;setDayExtra(date,extra);
}
function addLink(date){
  const type=document.getElementById('link-type').value;
  const url=document.getElementById('link-url').value;
  const title=document.getElementById('link-title').value;
  if(!url)return;
  const extra=getDayExtra(date);
  if(!extra.links)extra.links=[];
  extra.links.push({type,url,title});
  setDayExtra(date,extra);render();
}
function removeLink(date,li){
  const extra=getDayExtra(date);extra.links.splice(li,1);setDayExtra(date,extra);render();
}
function addDayMaterial(pi,di){
  const val=document.getElementById('new-mat').value.trim();
  if(!val)return;
  if(!DATA.phases[pi].days[di].materials)DATA.phases[pi].days[di].materials=[];
  DATA.phases[pi].days[di].materials.push(val);
  saveData(DATA);render();
}
function removeDayMaterial(pi,di,mi){
  DATA.phases[pi].days[di].materials.splice(mi,1);saveData(DATA);render();
}
function toggleWorker(date){
  if(!DATA.workers[date])DATA.workers[date]=[];
  const arr=DATA.workers[date];
  const idx=arr.indexOf(USER);
  if(idx>=0)arr.splice(idx,1);else arr.push(USER);
  saveData(DATA);render();
}
function removeDayPrompt(pi,di){
  if(confirm('Remove '+DATA.phases[pi].days[di].label+'?')){
    const date=DATA.phases[pi].days[di].date;
    DATA.phases[pi].days.splice(di,1);
    delete DATA.workers[date];delete DATA.dayData[date];
    saveData(DATA);navPhase(pi);
  }
}

// ── Modals ──
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden')}
function hideModal(){document.getElementById('modal-overlay').classList.add('hidden')}

function addDayModal(pi){
  showModal(`<h2>Add Day to ${esc(DATA.phases[pi].name)}</h2>
    <label>Date</label><input id="md-date" type="date">
    <label>Label (e.g. M 7/6)</label><input id="md-label" placeholder="M 7/6">
    <label>Type (WFH, off, etc)</label><input id="md-type" placeholder="WFH">
    <label>Work Description</label><textarea id="md-work" placeholder="What we're doing..."></textarea>
    <div class="modal-btns"><button class="btn-cancel" onclick="hideModal()">Cancel</button><button class="btn-primary" onclick="addDay(${pi})">Add</button></div>`);
}
function addDay(pi){
  const date=document.getElementById('md-date').value;
  const label=document.getElementById('md-label').value;
  const type=document.getElementById('md-type').value;
  const work=document.getElementById('md-work').value;
  if(!date||!label||!work)return;
  DATA.phases[pi].days.push({date,label,type,work,status:'planned',notes:'',links:[],materials:[]});
  DATA.phases[pi].days.sort((a,b)=>a.date.localeCompare(b.date));
  saveData(DATA);hideModal();render();
}
function addPhaseModal(){
  showModal(`<h2>Add Phase</h2>
    <label>Phase Name</label><input id="md-pname" placeholder="Phase 7: ...">
    <label>Date Range</label><input id="md-pdates" placeholder="10/1–10/15">
    <label>Milestone</label><textarea id="md-pmilestone" placeholder="What this phase achieves..."></textarea>
    <div class="modal-btns"><button class="btn-cancel" onclick="hideModal()">Cancel</button><button class="btn-primary" onclick="addPhase()">Add</button></div>`);
}
function addPhase(){
  const name=document.getElementById('md-pname').value;
  const dates=document.getElementById('md-pdates').value;
  const milestone=document.getElementById('md-pmilestone').value;
  if(!name)return;
  DATA.phases.push({name,dates:dates||'',milestone:milestone||'',days:[],materials:[]});
  saveData(DATA);hideModal();render();
}

// ── Utilities ──
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function escAttr(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ── Event listeners ──
document.addEventListener('click',function(e){
  const dd=document.getElementById('login-dropdown');
  const btn=document.getElementById('auth-btn');
  if(!dd.classList.contains('hidden')&&!dd.contains(e.target)&&e.target!==btn)dd.classList.add('hidden');
});
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)hideModal()});

// ── Init ──
(function(){
  DATA=loadData();
  const saved=LS.get('auth',null);
  // Restore session — Google users don't need PIN check
  if(saved){
    const method=LS.get('authMethod',null);
    if(method==='google'||DATA.pins[saved]){
      USER=saved;
    }
  }
  render();
  waitForGSI();
})();
</script>
</body>
</html>
