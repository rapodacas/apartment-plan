<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apartment Build — 864 Farr Ave</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a5c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Theme Variables ── */
:root{
  --bg:#0d1117;--bg-card:#161b22;--bg-card-alt:#1c2533;--bg-input:#0d1117;
  --text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--accent-bg:#1a3a5c;--accent-hover:#264d73;
  --border:#21262d;--border-light:#30363d;
  --green:#3fb950;--green-bg:#0d2818;--yellow:#d29922;--yellow-bg:#3d2e00;--red:#f85149;--red-bg:#3d1418;
  --header-bg:linear-gradient(135deg,#1a3a5c,#264d73);
  --worker-raoul-bg:#1a3a5c;--worker-raoul-c:#58a6ff;
  --worker-charlie-bg:#3a1a5c;--worker-charlie-c:#bc8cff;
  --worker-vinny-bg:#1a5c3a;--worker-vinny-c:#3fb950;
  --worker-joaquin-bg:#5c3a1a;--worker-joaquin-c:#d29922;
  --modal-cancel-bg:#21262d;--modal-cancel-c:#8b949e;
}
body.light{
  --bg:#f0f4f8;--bg-card:#fff;--bg-card-alt:#dce8f5;--bg-input:#fff;
  --text:#2d2d2d;--text-muted:#6a8aaa;--accent:#2a6a9a;--accent-bg:#2a4a6a;--accent-hover:#3a6a9a;
  --border:#e0e8f0;--border-light:#d0dce8;
  --green:#155724;--green-bg:#d4edda;--yellow:#856404;--yellow-bg:#fff3cd;--red:#721c24;--red-bg:#f8d7da;
  --header-bg:linear-gradient(135deg,#2a4a6a,#3a6a9a);
  --worker-raoul-bg:#2a4a6a;--worker-raoul-c:#fff;
  --worker-charlie-bg:#6a3a9a;--worker-charlie-c:#fff;
  --worker-vinny-bg:#3a9a6a;--worker-vinny-c:#fff;
  --worker-joaquin-bg:#9a6a3a;--worker-joaquin-c:#fff;
  --modal-cancel-bg:#eee;--modal-cancel-c:#555;
}
/* Light overrides for all hardcoded dark colors */
body.light{background:#f0f4f8;color:#2d2d2d}
body.light #app-header{background:linear-gradient(135deg,#2a4a6a,#3a6a9a);border-color:#d0dce8}
body.light #login-dropdown{background:#fff;border-color:#d0dce8;box-shadow:0 4px 20px rgba(0,0,0,.12)}
body.light #login-dropdown select,body.light #login-dropdown input{background:#fff;color:#2d2d2d;border-color:#d0dce8}
body.light #login-dropdown button.pin-btn{background:#2a4a6a}
body.light .login-err{color:#c44}
body.light .login-divider{color:#aaa}
body.light .login-divider::before,body.light .login-divider::after{background:#ddd}
/* breadcrumb removed — bottom nav replaces it */
body.light .info-card{background:#fff;border-color:#e0e8f0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.light .info-card h2{color:#2a4a6a}
body.light .summary-stat{background:#fff;border-color:#e0e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
body.light .summary-stat .num{color:#2a4a6a}
body.light .summary-stat .label{color:#888}
body.light .phase-card{background:#fff;border-color:#e0e8f0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.light .phase-card:hover{border-color:#2a6a9a;box-shadow:0 4px 16px rgba(0,0,0,.1)}
body.light .phase-card-header{background:#2a4a6a}
body.light .phase-card-body{color:#2d2d2d}
body.light .phase-stats{color:#6a8aaa}
body.light .phase-stats strong{color:#2a4a6a}
body.light .phase-progress{background:#e0e8f0}
body.light .phase-progress-fill{background:#3a9a6a}
body.light .task-card{background:#fff;border-color:#e0e8f0}
body.light .task-card:hover{border-color:#2a6a9a}
body.light .task-card:nth-child(odd) .task-card-inner{background:#dce8f5}
body.light .task-card:nth-child(even) .task-card-inner{background:#fff}
body.light .task-card-date .day-type{color:#6a8aaa}
body.light .task-deps{color:#aaa}
body.light .status-planned{background:#e0e8f0;color:#6a8aaa;border-color:#d0dce8}
body.light .status-in-progress{background:#fff3cd;color:#856404;border-color:#856404}
body.light .status-done{background:#d4edda;color:#155724;border-color:#155724}
body.light .status-overdue{background:#f8d7da;color:#721c24;border-color:#721c24}
body.light .task-detail-header{background:#2a4a6a}
body.light .task-detail-body{background:#fff;border-color:#e0e8f0}
body.light .detail-section{border-color:#eef2f6}
body.light .detail-section h3{color:#2a4a6a}
body.light .detail-section textarea,body.light .detail-section input[type="text"],body.light .detail-section input[type="date"]{background:#fff;color:#2d2d2d;border-color:#d0dce8}
body.light .status-picker button{background:#fff;color:#666;border-color:#d0dce8}
body.light .status-picker button.active-planned{border-color:#6a8aaa;background:#e0e8f0;color:#6a8aaa}
body.light .status-picker button.active-in-progress{border-color:#856404;background:#fff3cd;color:#856404}
body.light .status-picker button.active-done{border-color:#155724;background:#d4edda;color:#155724}
body.light .mat-pill{background:#eef4fa;color:#2a4a6a;border-color:#d0dce8}
body.light .link-item{border-color:#f0f4f8}
body.light .link-remove{color:#c44}
body.light .worker-badge.raoul{background:#2a4a6a;color:#fff}
body.light .worker-badge.charlie{background:#6a3a9a;color:#fff}
body.light .worker-badge.vinny{background:#3a9a6a;color:#fff}
body.light .worker-badge.joaquin{background:#9a6a3a;color:#fff}
body.light .worker-toggle{background:#fff;color:#2d2d2d;border-color:#d0dce8}
body.light .worker-toggle.signed-up{background:#3a9a6a;color:#fff;border-color:#3a9a6a}
body.light .btn-primary{background:#2a4a6a;color:#fff}
body.light .btn-primary:hover{background:#3a6a9a}
body.light .btn-danger{background:#c44;color:#fff}
body.light .btn-warn{background:#e67e22;color:#fff}
body.light .dep-tag{background:#eef4fa;color:#2a4a6a;border-color:#d0dce8}
body.light .dep-tag.unmet{background:#f8d7da;color:#721c24;border-color:#721c24}
body.light .push-controls select,body.light .push-controls input{background:#fff;color:#2d2d2d;border-color:#d0dce8}
body.light .overdue-banner{background:#f8d7da;color:#721c24;border-color:#c44}
body.light .overdue-item{border-color:rgba(114,28,36,.1)}
body.light .app-footer{color:#999}
body.light .modal{background:#fff;border-color:#d0dce8}
body.light .modal h2{color:#2a4a6a}
body.light .modal label{color:#555}
body.light .modal input,body.light .modal select,body.light .modal textarea{background:#fff;color:#2d2d2d;border-color:#d0dce8}
body.light .modal-btns .btn-primary{background:#2a4a6a;color:#fff}
body.light .modal-btns .btn-cancel{background:#eee;color:#555}

body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;transition:background .2s,color .2s;padding-bottom:60px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#161b22;border-top:1px solid #30363d;z-index:100;height:56px}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:#8b949e;font-size:10px;cursor:pointer;padding:6px;font-weight:600}
.bottom-nav button.active{color:#58a6ff}
.bottom-nav button .nav-icon{font-size:20px}
body.light .bottom-nav{background:#fff;border-top-color:#d0dce8}
body.light .bottom-nav button{color:#6a8aaa}
body.light .bottom-nav button.active{color:#2a6a9a}

/* Tab content */
.tab-content{display:none}
.tab-content.active{display:block}

/* Phases accordion */
.phase-acc{margin:8px 16px;border-radius:10px;border:1px solid #21262d;overflow:hidden}
.phase-acc-header{background:#1a3a5c;color:#fff;padding:14px 18px;font-size:15px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.phase-acc-header .arrow{transition:transform .2s}
.phase-acc-header.open .arrow{transform:rotate(180deg)}
.phase-acc-body{display:none;background:#161b22}
.phase-acc-body.open{display:block}
.phase-task{display:flex;align-items:center;padding:12px 18px;gap:12px;border-bottom:1px solid #21262d;cursor:pointer}
.phase-task:last-child{border:none}
.phase-task:nth-child(odd){background:#1c2533}
.phase-task .pt-date{min-width:60px;font-weight:700;font-size:14px}
.phase-task .pt-date span{font-size:10px;color:#8b949e;font-weight:400;display:block}
.phase-task .pt-work{flex:1;font-size:14px}
.pt-status{font-size:11px;padding:3px 8px;border-radius:8px;font-weight:600}
.pt-status.overdue{background:#3d1418;color:#f85149}
.pt-status.planned{background:#1c2533;color:#8b949e}
.pt-status.in-progress{background:#3d2e00;color:#d29922}
.pt-status.done{background:#0d2818;color:#3fb950}
.phase-acc-progress{height:4px;background:#21262d;margin:0 18px 12px}
.phase-acc-progress-fill{height:100%;background:#3fb950;border-radius:2px}
.phase-task-workers{display:flex;gap:3px;flex-wrap:wrap}

body.light .phase-acc{border-color:#e0e8f0}
body.light .phase-acc-header{background:#2a4a6a}
body.light .phase-acc-body{background:#fff}
body.light .phase-task:nth-child(odd){background:#dce8f5}
body.light .phase-task{border-color:#e0e8f0}
body.light .pt-status.overdue{background:#f8d7da;color:#721c24}
body.light .pt-status.planned{background:#e0e8f0;color:#6a8aaa}
body.light .pt-status.in-progress{background:#fff3cd;color:#856404}
body.light .pt-status.done{background:#d4edda;color:#155724}
body.light .phase-acc-progress{background:#e0e8f0}

/* Task placeholder */
.task-placeholder{text-align:center;padding:60px 20px;color:#8b949e;font-size:15px}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

#app-header{background:linear-gradient(135deg,#1a3a5c,#264d73);color:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #30363d}
#app-header h1{font-size:19px;font-weight:600;cursor:pointer}
.header-right{display:flex;align-items:center;gap:10px;font-size:15px}
#header-user-label{opacity:.85}
#app-header button{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:14px;cursor:pointer}
#app-header button:hover{background:rgba(255,255,255,.2)}

#login-dropdown{position:absolute;top:56px;right:12px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px;width:310px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:150}
#login-dropdown select,#login-dropdown input{width:100%;padding:11px 14px;border:1px solid #30363d;border-radius:6px;font-size:16px;margin-bottom:12px;background:#0d1117;color:#e6edf3}
#login-dropdown button.pin-btn{width:100%;padding:11px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-weight:600}
.login-err{color:#f85149;font-size:15px;margin-bottom:8px}
.login-divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:13px;color:#8b949e}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#30363d}
#g-signin-btn{display:flex;justify-content:center;margin-bottom:6px}

/* breadcrumb CSS removed */

.info-card{background:#161b22;margin:14px 16px;border-radius:10px;padding:20px 22px;border:1px solid #21262d}
.info-card h2{font-size:19px;color:#58a6ff;margin-bottom:12px}
.info-card ul{padding-left:22px;font-size:16px;line-height:1.7}
.info-card p{font-size:16px;line-height:1.6}

.summary-bar{display:flex;flex-wrap:wrap;gap:12px;margin:14px 16px}
.summary-stat{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px 18px;text-align:center;min-width:80px;flex:1}
.summary-stat .num{font-size:28px;font-weight:700;color:#58a6ff}
.summary-stat .label{font-size:14px;color:#8b949e}

/* Phase cards */
.phase-card{background:#161b22;margin:14px 16px;border-radius:10px;overflow:hidden;border:1px solid #21262d;cursor:pointer;transition:border-color .15s}
.phase-card:hover{border-color:#58a6ff}
.phase-card-header{background:#1a3a5c;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.phase-card-header h2{font-size:19px;font-weight:600;margin:0}
.phase-card-dates{font-size:15px;opacity:.8}
.phase-card-body{padding:16px 20px;font-size:16px;line-height:1.6}
.phase-stats{display:flex;gap:18px;font-size:15px;color:#8b949e}
.phase-stats strong{color:#58a6ff}
.phase-progress{height:5px;background:#21262d;border-radius:3px;margin-top:10px;overflow:hidden}
.phase-progress-fill{height:100%;background:#3fb950;border-radius:3px}

/* Task cards */
.task-card{background:#161b22;margin:8px 16px;border-radius:8px;overflow:hidden;border:1px solid #21262d;cursor:pointer;transition:border-color .15s}
.task-card:hover{border-color:#58a6ff}
.task-card:nth-child(odd) .task-card-inner{background:#1c2533}
.task-card:nth-child(even) .task-card-inner{background:#161b22}
.task-card-inner{display:flex;align-items:center;padding:14px 18px;gap:14px}
.task-card-date{min-width:72px;font-weight:700;font-size:17px;line-height:1.2}
.task-card-date .day-type{font-size:13px;color:#8b949e;font-weight:400;display:block}
.task-card-work{flex:1;font-size:17px}
.task-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:95px}
.task-status{font-size:13px;padding:4px 10px;border-radius:10px;font-weight:600;cursor:pointer;user-select:none}
.task-status:hover{opacity:.8}
.status-planned{background:#1c2533;color:#8b949e;border:1px solid #30363d}
.status-in-progress{background:#3d2e00;color:#d29922;border:1px solid #d29922}
.status-done{background:#0d2818;color:#3fb950;border:1px solid #3fb950}
.status-overdue{background:#3d1418;color:#f85149;border:1px solid #f85149}
.task-card-workers{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.task-deps{font-size:12px;color:#8b949e;margin-top:3px}

/* Task detail */
.task-detail{margin:14px 16px}
.task-detail-header{background:#1a3a5c;color:#fff;padding:20px 22px;border-radius:10px 10px 0 0}
.task-detail-header h2{font-size:22px;margin:0 0 6px}
.task-detail-header .task-detail-sub{font-size:16px;opacity:.85}
.task-detail-body{background:#161b22;border:1px solid #21262d;border-top:none;border-radius:0 0 10px 10px}
.detail-section{padding:18px 22px;border-bottom:1px solid #21262d}
.detail-section:last-child{border-bottom:none}
.detail-section h3{font-size:17px;color:#58a6ff;margin-bottom:12px;font-weight:600}
.detail-section textarea,.detail-section input[type="text"],.detail-section input[type="date"]{width:100%;padding:12px;border:1px solid #30363d;border-radius:6px;font-size:16px;font-family:inherit;resize:vertical;background:#0d1117;color:#e6edf3}
.detail-section textarea{min-height:80px}

.status-picker{display:flex;gap:8px;flex-wrap:wrap}
.status-picker button{padding:10px 18px;border:2px solid #30363d;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600;background:#0d1117;color:#8b949e}
.status-picker button.active-planned{border-color:#8b949e;background:#1c2533;color:#8b949e}
.status-picker button.active-in-progress{border-color:#d29922;background:#3d2e00;color:#d29922}
.status-picker button.active-done{border-color:#3fb950;background:#0d2818;color:#3fb950}

.mat-pills{display:flex;flex-wrap:wrap;gap:6px}
.mat-pill{display:inline-flex;align-items:center;gap:4px;font-size:14px;padding:5px 12px;border-radius:14px;background:#1c2533;color:#58a6ff;border:1px solid #30363d}
.mat-pill .link-remove{padding:0 2px;font-size:12px}
.link-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #21262d;font-size:16px}
.link-item:last-child{border:none}
.link-remove{color:#f85149;cursor:pointer;font-size:14px;padding:2px 6px}

.worker-badge{font-size:13px;padding:4px 10px;border-radius:10px;font-weight:600;display:inline-block}
.worker-badge.raoul{background:#1a3a5c;color:#58a6ff}
.worker-badge.charlie{background:#3a1a5c;color:#bc8cff}
.worker-badge.vinny{background:#1a5c3a;color:#3fb950}
.worker-badge.joaquin{background:#5c3a1a;color:#d29922}
.worker-toggle{font-size:15px;padding:7px 16px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;cursor:pointer}
.worker-toggle.signed-up{background:#0d2818;color:#3fb950;border-color:#3fb950}

.btn{padding:10px 18px;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.btn-primary{background:#1a3a5c;color:#58a6ff}
.btn-primary:hover{background:#264d73}
.btn-danger{background:#3d1418;color:#f85149}
.btn-sm{padding:6px 12px;font-size:14px}
.btn-warn{background:#3d2e00;color:#d29922}

.dep-tag{display:inline-block;font-size:13px;padding:3px 10px;border-radius:10px;background:#1c2533;color:#58a6ff;margin:2px;cursor:default;border:1px solid #30363d}
.dep-tag.unmet{background:#3d1418;color:#f85149;border-color:#f85149}

/* Push schedule controls */
.push-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.push-controls select,.push-controls input{padding:8px 12px;border:1px solid #30363d;border-radius:6px;font-size:15px;background:#0d1117;color:#e6edf3}

/* Overdue banner */
.overdue-banner{background:#3d1418;border-left:4px solid #f85149;margin:14px 16px;border-radius:0 8px 8px 0;padding:14px 18px;font-size:16px;color:#f85149}
.overdue-banner h3{margin:0 0 10px;font-size:17px}
.overdue-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(248,81,73,.15);gap:8px}
.overdue-item:last-child{border:none}

/* View toggle */
.view-toggle{display:flex;gap:0;margin:14px 16px 0;border-radius:8px;overflow:hidden;border:1px solid #30363d}
.view-toggle button{flex:1;padding:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;background:#161b22;color:#8b949e}
.view-toggle button.active{background:#1a3a5c;color:#58a6ff}
body.light .view-toggle{border-color:#d0dce8}
body.light .view-toggle button{background:#fff;color:#6a8aaa}
body.light .view-toggle button.active{background:#2a4a6a;color:#fff}

/* Calendar */
.cal-month{background:#161b22;margin:14px 16px;border-radius:10px;border:1px solid #21262d;overflow:hidden}
.cal-month-header{background:#1a3a5c;color:#fff;padding:12px 18px;font-size:17px;font-weight:600;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#21262d;padding:1px}
.cal-dow{background:#0d1117;padding:6px;text-align:center;font-size:12px;color:#8b949e;font-weight:600}
.cal-cell{background:#0d1117;min-height:70px;padding:4px 6px;font-size:13px;position:relative;cursor:default}
.cal-cell.empty{background:#0d1117;opacity:.3}
.cal-cell.workday{background:#161b22;cursor:pointer}
.cal-cell.workday:hover{background:#1c2533}
.cal-cell.today{box-shadow:inset 0 0 0 2px #58a6ff}
.cal-day-num{font-weight:700;font-size:14px;color:#8b949e;margin-bottom:3px}
.cal-cell.workday .cal-day-num{color:#e6edf3}
.cal-task-count{font-size:10px;padding:1px 5px;border-radius:6px;display:inline-block;margin-bottom:2px}
.cal-task-count.all-done{background:#0d2818;color:#3fb950}
.cal-task-count.has-overdue{background:#3d1418;color:#f85149}
.cal-task-count.in-prog{background:#3d2e00;color:#d29922}
.cal-task-count.all-planned{background:#1c2533;color:#8b949e}
.cal-workers{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.cal-worker{font-size:9px;padding:1px 4px;border-radius:6px;font-weight:700}
.cal-worker.raoul{background:#1a3a5c;color:#58a6ff}
.cal-worker.charlie{background:#3a1a5c;color:#bc8cff}
.cal-worker.vinny{background:#1a5c3a;color:#3fb950}

function saveData(d){

  LS.set('pins',d.pins);LS.set('scope',d.scope);LS.set('risks',d.risks);LS.set('tasks',d.tasks);LS.set('workers',d.workers);
  // Save to Firebase (async, syncs to all users)
  _skipNextFirebaseUpdate=true;
  planRef.set({scope:d.scope,risks:d.risks,tasks:d.tasks,workers:d.workers}).catch(e=>console.error('Firebase save error:',e));
}

// Listen for real-time updates from other users
function initFirebaseSync(){
  planRef.on('value',snapshot=>{
    if(_skipNextFirebaseUpdate){_skipNextFirebaseUpdate=false;return}
    const val=snapshot.val();
    if(!val)return;
    // Update localStorage with Firebase data
    if(val.scope)LS.set('scope',val.scope);
    if(val.risks)LS.set('risks',val.risks);
    if(val.tasks)LS.set('tasks',val.tasks);
    if(val.workers)LS.set('workers',val.workers);
    // Reload and re-render
    DATA=loadData();fixAllTasks();
    _firebaseReady=true;
    render();
    console.log('Synced from Firebase');
  },err=>{console.error('Firebase listen error:',err)});
}

    await planRef.set({scope:DEFAULT_SCOPE,risks:DEFAULT_RISKS,tasks:DEFAULT_TASKS,workers:{}});
  }
}

// ── Auth (OAuth2 token client for Drive API access) ──
let ACCESS_TOKEN=null;
let tokenClient=null;

function handleGoogleSignIn(response){
  const payload=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  const mapping=EMAIL_ROLES[payload.email.toLowerCase()];
  if(mapping){USER=mapping.uid;LS.set('auth',USER);LS.set('authMethod','google');LS.set('googleName',payload.name);LS.set('googleEmail',payload.email)}
  else{document.getElementById('login-err').textContent='Email not authorized: '+payload.email;document.getElementById('login-err').classList.remove('hidden');return}
  document.getElementById('login-dropdown').classList.add('hidden');
  render();
}

function initGoogleSignIn(){
  if(typeof google==='undefined'||!google.accounts)return;
  // ID token for identity
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleSignIn,auto_select:false});
  google.accounts.id.renderButton(document.getElementById('g-signin-btn'),{theme:'outline',size:'large',width:268});
  // Token client for Drive API
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:(resp)=>{
      if(resp.access_token){ACCESS_TOKEN=resp.access_token;console.log('Drive access granted')}
    }
  });
}
let _gsiR=0;function waitForGSI(){if(typeof google!=='undefined'&&google.accounts){initGoogleSignIn();return}if(_gsiR++<20)setTimeout(waitForGSI,250)}

// Ensure we have a Drive token (re-request if expired)
function ensureDriveToken(){
  return new Promise((resolve,reject)=>{
    if(ACCESS_TOKEN){resolve(ACCESS_TOKEN);return}
    if(!tokenClient){reject(new Error('Not signed in with Google. Log out and sign in with Google first.'));return}
    tokenClient.callback=(resp)=>{
      if(resp.error){reject(new Error('Drive access denied: '+resp.error));return}
      if(resp.access_token){ACCESS_TOKEN=resp.access_token;resolve(ACCESS_TOKEN)}
      else reject(new Error('No access token received. Check popup blocker.'));
    };
    try{tokenClient.requestAccessToken({prompt:'consent'})}
    catch(e){reject(new Error('Could not open Google consent. Check popup blocker.'))}
  });
}

function phaseIdx(name){return getPhases().indexOf(name)}

function slugify(s){return(s||'').replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()}

// ── Helpers ──
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getTask(id){return DATA.tasks.find(t=>t.id===id)}
// Firebase drops empty arrays — normalize task fields
function fixTask(t){t.dependsOn=t.dependsOn||[];t.materials=t.materials||[];t.links=t.links||[];t.notes=t.notes||'';return t}
function fixAllTasks(){DATA.tasks.forEach(fixTask)}
function getPhases(){const seen=[];DATA.tasks.forEach(t=>{if(!seen.includes(t.phase))seen.push(t.phase)});return seen}
function getTasksForPhase(phase){return DATA.tasks.filter(t=>t.phase===phase).sort((a,b)=>a.order-b.order)}
function getTasksForDate(date){return DATA.tasks.filter(t=>t.scheduledDate===date).sort((a,b)=>a.order-b.order)}
function getEffectiveStatus(task){if(task.status==='done')return'done';if(task.scheduledDate<todayStr())return'overdue';return task.status||'planned'}
function nextAvailableDay(afterDate){return AVAILABLE_DAYS.find(d=>d>afterDate)||null}
function depsMetFor(task){return task.dependsOn.every(depId=>{const dep=getTask(depId);return dep&&dep.status==='done'})}

// ── Schedule Push ──
function pushScheduleFrom(taskId){
  const task=getTask(taskId);if(!task)return;
  // Get all undone tasks scheduled on or after this task's date, sorted by order
  const toMove=DATA.tasks.filter(t=>t.status!=='done'&&t.scheduledDate>=task.scheduledDate).sort((a,b)=>a.order-b.order);
  // Reassign dates sequentially from available days starting after previous day
  let dayIdx=AVAILABLE_DAYS.indexOf(task.scheduledDate);
  if(dayIdx<0)dayIdx=AVAILABLE_DAYS.findIndex(d=>d>=task.scheduledDate);
  // Shift by 1: start from next available day
  dayIdx++;
  toMove.forEach(t=>{
    if(dayIdx<AVAILABLE_DAYS.length){t.scheduledDate=AVAILABLE_DAYS[dayIdx];dayIdx++}
  });
  saveData(DATA);render();
}

function rescheduleTask(taskId,newDate){
  const task=getTask(taskId);if(!task)return;
  task.scheduledDate=newDate;
  saveData(DATA);render();
}

function renderCalendar(){
  let h='';
  const months=[
    {year:2026,month:6,name:'July 2026'},
    {year:2026,month:7,name:'August 2026'},
    {year:2026,month:8,name:'September 2026'}
  ];
  const today=todayStr();
  const tasksByDate={};
  DATA.tasks.forEach(t=>{
    if(!tasksByDate[t.scheduledDate])tasksByDate[t.scheduledDate]=[];
    tasksByDate[t.scheduledDate].push(t);
  });
  const workdaySet=new Set(AVAILABLE_DAYS);

  months.forEach(m=>{
    h+=`<div class="cal-month"><div class="cal-month-header">${m.name}</div><div class="cal-grid">`;
    // Day of week headers
    ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
    // First day of month
    const firstDay=new Date(m.year,m.month,1);
    let startDow=firstDay.getDay();
    startDow=startDow===0?6:startDow-1; // Monday=0
    const daysInMonth=new Date(m.year,m.month+1,0).getDate();
    // Empty cells before first day
    for(let i=0;i<startDow;i++)h+=`<div class="cal-cell empty"></div>`;
    // Day cells
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${m.year}-${String(m.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isWork=workdaySet.has(dateStr);
      const isToday=dateStr===today;
      const tasks=tasksByDate[dateStr]||[];
      const workers=DATA.workers[dateStr]||[];

      let cellClass='cal-cell';
      if(isWork)cellClass+=' workday';
      if(!isWork&&!tasks.length)cellClass+=' empty';
      if(isToday)cellClass+=' today';

      const onclick=tasks.length?` onclick="navDayView('${dateStr}')"`:isWork?` onclick="navDayView('${dateStr}')"`:''

      h+=`<div class="${cellClass}" id="day-${dateStr}"${onclick}>`;
      h+=`<div class="cal-day-num">${d}</div>`;

      if(tasks.length){
        const allDone=tasks.every(t=>t.status==='done');
        const hasOverdue=tasks.some(t=>getEffectiveStatus(t)==='overdue');
        const hasInProg=tasks.some(t=>t.status==='in-progress');
        let countClass='all-planned';
        if(allDone)countClass='all-done';
        else if(hasOverdue)countClass='has-overdue';
        else if(hasInProg)countClass='in-prog';
        h+=`<div class="cal-task-count ${countClass}">${tasks.length} task${tasks.length>1?'s':''}</div>`;
      }

      if(workers.length){
        h+=`<div class="cal-workers">`;
        workers.forEach(w=>h+=`<span class="cal-worker ${w}">${w.charAt(0).toUpperCase()}</span>`);
        h+=`</div>`;
      }

      h+=`</div>`;
    }
    // Fill remaining cells
    const totalCells=startDow+daysInMonth;
    const remainder=totalCells%7;
    if(remainder)for(let i=0;i<7-remainder;i++)h+=`<div class="cal-cell empty"></div>`;

    h+=`</div></div>`;
  });
  return h;
}

// Navigate to a day's tasks (from calendar)

// ── Push Notifications ──
const VAPID_PUBLIC='BMniAuSsNetW4QxhshvbHNZYKzeFs9jK2IkGd6yu9h3RXqohpjZvvshfKgSnkJLXh-kDCzmoq_SogFUwgSVXab4';
const VAPID_PRIVATE='fiz4abuSZP2LVouKL-T7adHU9u75kZRXbdQSl2sdfa0';
let _swRegistration=null;

async function initServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  try{
    _swRegistration=await navigator.serviceWorker.register('service-worker.js');
    console.log('SW registered');
    // Listen for messages from SW (scroll to day on notification click)
    navigator.serviceWorker.addEventListener('message',e=>{
      if(e.data?.type==='SCROLL_TO_DAY'&&e.data.date){
        TAB='calendar';render();
        setTimeout(()=>{const el=document.getElementById('day-'+e.data.date);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.animation='toastIn .3s ease'}},100);
      }
    });
  }catch(e){console.error('SW registration failed:',e)}
}

async function subscribeToPush(){
  if(!_swRegistration)return null;
  // Check existing subscription
  let sub=await _swRegistration.pushManager.getSubscription();
  if(sub)return sub;
  // Request permission
  const perm=await Notification.requestPermission();
  if(perm!=='granted'){console.log('Notification permission denied');return null}
  // Subscribe
  const vapidBytes=Uint8Array.from(atob(VAPID_PUBLIC.replace(/-/g,'+').replace(/_/g,'/')),c=>c.charCodeAt(0));
  sub=await _swRegistration.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:vapidBytes});
  return sub;
}

async function enableNotifications(){
  const sub=await subscribeToPush();
  if(!sub)return;
  // Store subscription in Firebase under /subscriptions/{userId}
  const subData=sub.toJSON();
  await db.ref('subscriptions/'+(USER||'anon')).set(subData);
  console.log('Push subscription saved');
  render();
}

async function sendPushToAdmins(title,body,date){
  // Get admin subscriptions from Firebase
  const snapshot=await db.ref('subscriptions/raoul').once('value');
  const subData=snapshot.val();
  if(!subData||!subData.endpoint)return;

  // Send push via the subscription endpoint
  // Client-side push requires the web-push protocol — we'll use a lightweight fetch approach
  // For client-to-client push, we store the notification in Firebase and let the admin's SW poll
  // Simpler: write to a /notifications node that the admin's app watches
  await db.ref('notifications').push({title,body,date,timestamp:Date.now(),read:false});
}

function checkNotificationSupport(){
  return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
}

// Watch for new notifications (in-app)
function initNotificationListener(){
  db.ref('notifications').orderByChild('timestamp').startAt(Date.now()).on('child_added',snapshot=>{
    const n=snapshot.val();
    if(!n||n.read)return;
    showToast(n.title,n.body,n.date);

    if(document.hidden&&Notification.permission==='granted'){
      new Notification(n.title,{body:n.body,icon:'icon-192.png',tag:'signup-'+n.date});
    }
    // Mark as read
    snapshot.ref.update({read:true});
  });
}

// ── Photo/Video Capture & Upload ──
const DRIVE_FOLDER_NAME='ApartmentBuild';
let _driveFolderId=null;

async function getOrCreateFolder(){
  if(_driveFolderId)return _driveFolderId;
  const token=await ensureDriveToken();
  // Search for existing folder
  const searchResp=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FOLDER_NAME}'+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id)`,{headers:{Authorization:'Bearer '+token}});
  const searchData=await searchResp.json();
  if(searchData.files&&searchData.files.length>0){_driveFolderId=searchData.files[0].id;return _driveFolderId}
  // Create folder
  const createResp=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:DRIVE_FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})});
  const createData=await createResp.json();
  _driveFolderId=createData.id;return _driveFolderId;
}

async function uploadToDrive(blob,filename,mimeType){
  const token=await ensureDriveToken();
  const folderId=await getOrCreateFolder();
  // Multipart upload
  const metadata={name:filename,parents:[folderId]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file',blob);
  const resp=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink',{method:'POST',headers:{Authorization:'Bearer '+token},body:form});
  const data=await resp.json();
  if(!data.id)throw new Error('Upload failed: '+JSON.stringify(data));
  // Make viewable by link
  await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({role:'reader',type:'anyone'})});
  return{id:data.id,url:data.webViewLink||`https://drive.google.com/file/d/${data.id}/view`,directUrl:`https://drive.google.com/uc?id=${data.id}`};
}

// Compress photo via canvas
function compressPhoto(file,maxWidth=1920,quality=0.8){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(blob),'image/jpeg',quality);
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

// Record 5-sec video
function recordVideo(taskId){
  showModal(`<h2>Record Video (5 sec)</h2>
    <video id="vid-preview" autoplay playsinline muted style="width:100%;border-radius:8px;background:#000;max-height:300px"></video>
    <p id="vid-status" style="text-align:center;margin:10px 0;font-size:14px;color:#666">Starting camera...</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="stopVideoCapture();hideModal()">Cancel</button>
      <button class="btn-primary" id="vid-record-btn" onclick="startRecording('${taskId}')" disabled>Record</button>
    </div>`);
  startVideoPreview();
}

let _mediaStream=null,_mediaRecorder=null,_videoChunks=[];

async function startVideoPreview(){
  try{
    _mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
    document.getElementById('vid-preview').srcObject=_mediaStream;
    document.getElementById('vid-status').textContent='Ready — tap Record';
    document.getElementById('vid-record-btn').disabled=false;
  }catch(e){document.getElementById('vid-status').textContent='Camera error: '+e.message}
}

function startRecording(taskId){
  _videoChunks=[];
  const options={mimeType:'video/webm;codecs=vp8',videoBitsPerSecond:1000000};
  try{_mediaRecorder=new MediaRecorder(_mediaStream,options)}catch(e){_mediaRecorder=new MediaRecorder(_mediaStream)}
  _mediaRecorder.ondataavailable=e=>{if(e.data.size>0)_videoChunks.push(e.data)};
  _mediaRecorder.onstop=async()=>{
    const blob=new Blob(_videoChunks,{type:'video/webm'});
    document.getElementById('vid-status').textContent='Uploading...';
    document.getElementById('vid-record-btn').disabled=true;
    try{
      const ts=Date.now();
      const result=await uploadToDrive(blob,`video_${taskId}_${ts}.webm`,'video/webm');
      const t=getTask(taskId);
      t.links.push({type:'video',url:result.url,title:`Video ${new Date().toLocaleDateString()}`,driveId:result.id});
      saveData(DATA);
      stopVideoCapture();hideModal();render();
    }catch(e){document.getElementById('vid-status').textContent='Upload failed: '+e.message;document.getElementById('vid-record-btn').disabled=false}
  };
  _mediaRecorder.start();
  document.getElementById('vid-status').textContent='Recording... 5';
  document.getElementById('vid-record-btn').textContent='Recording...';
  document.getElementById('vid-record-btn').disabled=true;
  let countdown=5;
  const intv=setInterval(()=>{countdown--;document.getElementById('vid-status').textContent=countdown>0?`Recording... ${countdown}`:'Stopping...';if(countdown<=0){clearInterval(intv);_mediaRecorder.stop()}},1000);
}

function stopVideoCapture(){
  if(_mediaStream){_mediaStream.getTracks().forEach(t=>t.stop());_mediaStream=null}
  if(_mediaRecorder&&_mediaRecorder.state!=='inactive'){_mediaRecorder.stop();_mediaRecorder=null}
}

// Photo capture (file input trigger)
function capturePhoto(taskId){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=async()=>{
    if(!input.files[0])return;
    showModal(`<h2>Uploading Photo...</h2><p style="text-align:center;font-size:14px;color:#666" id="photo-status">Compressing...</p><div class="modal-btns" style="margin-top:16px"><button class="btn-cancel" onclick="hideModal()">Cancel</button></div>`);
    try{
      // Check Drive token first
      if(!ACCESS_TOKEN){
        document.getElementById('photo-status').textContent='Requesting Drive access...';
        await ensureDriveToken();
      }
      const compressed=await compressPhoto(input.files[0]);
      const sizeKB=Math.round(compressed.size/1024);
      document.getElementById('photo-status').textContent=`Compressed to ${sizeKB}KB. Uploading to Drive...`;
      const ts=Date.now();
      const result=await uploadToDrive(compressed,`photo_${taskId}_${ts}.jpg`,'image/jpeg');
      const t=getTask(taskId);
      t.links.push({type:'photo',url:result.directUrl,title:`Photo ${new Date().toLocaleDateString()}`,driveId:result.id,viewUrl:result.url});
      saveData(DATA);hideModal();render();
    }catch(e){
      const el=document.getElementById('photo-status');
      if(el)el.innerHTML=`<span style="color:#c44">Error: ${esc(e.message||String(e))}</span><br><br>Make sure you allowed Google Drive access when signing in. Try logging out and back in with Google.`;
    }
  };
  input.click();
}

  const t=getTask(taskId);if(!t)return;
  const cycle={planned:'in-progress','in-progress':'done',done:'planned'};
  t.status=cycle[t.status||'planned']||'planned';
  if(t.status==='done')t.completedDate=todayStr();
  else t.completedDate=null;
  saveData(DATA);render();
}
function setTaskStatus(taskId,status){
  const t=getTask(taskId);if(!t)return;
  t.status=status;

}

    <label>Phase</label><select id="md-phase">${phases.map(p=>`<option value="${escAttr(p)}" ${p===phase?'selected':''}>${esc(p)}</option>`).join('')}<option value="__new">+ New Phase...</option></select>

function doAddTask(){

  if(phase==='__new')phase=document.getElementById('md-newphase').value;
  const work=document.getElementById('md-work').value,date=document.getElementById('md-date').value,order=parseInt(document.getElementById('md-order').value)||DATA.tasks.length+1;

}
