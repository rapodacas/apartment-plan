<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La Hacienda — 3D Concept</title>
<style>
html,body{margin:0;height:100%;background:#0d1117;overflow:hidden;font-family:-apple-system,'Segoe UI',Arial,sans-serif}
#c{width:100%;height:100%;display:block;touch-action:none}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;pointer-events:none}
#hud h1{font-size:15px;color:#e6edf3;margin:0;text-shadow:0 1px 4px rgba(0,0,0,.6)}
#hud .tag{font-size:10px;color:#9fb6cc;background:rgba(13,17,23,.55);border:1px solid rgba(255,255,255,.12);padding:2px 8px;border-radius:20px;backdrop-filter:blur(4px)}
#views{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 10px}
#views button,#views a{background:rgba(22,27,34,.85);border:1px solid #30363d;color:#58a6ff;font-size:12px;padding:8px 13px;border-radius:20px;cursor:pointer;backdrop-filter:blur(6px);text-decoration:none;font-family:inherit;white-space:nowrap;flex-shrink:0}
@media(max-width:700px){
  #views{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;scrollbar-width:none;-webkit-overflow-scrolling:touch;bottom:calc(10px + env(safe-area-inset-bottom))}
  #views::-webkit-scrollbar{display:none}
  #views button,#views a{font-size:11px;padding:6px 10px}
}
body.embed #hud,body.embed #note,body.embed #views a{display:none}
#views button.active{background:#1f6feb;color:#fff;border-color:#1f6feb}
#note{position:fixed;top:44px;left:14px;font-size:10px;color:#9fb6cc;text-shadow:0 1px 3px rgba(0,0,0,.7);pointer-events:none}
</style>
</head>
<body>
<script>if(new URLSearchParams(location.search).has('embed'))document.body.classList.add('embed');</script>
<canvas id="c"></canvas>
<div id="hud">
  <h1>La Hacienda — Apartment Concept</h1>
  <span class="tag">3D massing · not to scale for construction</span>
</div>
<div id="note">Drag to orbit · pinch/scroll to zoom · two-finger drag to pan</div>
<div id="views">
  <button data-v="aerial" class="active">Aerial</button>
  <button data-v="east">East Arches + Lawn</button>
  <button data-v="west">West Patio</button>
  <button data-v="kitchen">Kitchen Arcade</button>
  <button data-v="spa">North Arches + Spa</button>
  <button id="btn-kmode">Kitchen: Closed</button>
  <button id="btn-roof">Roof: On</button>
  <button id="btn-fence">Fence: Off</button>
  <a href="index.html">Home ↗</a>
  <a href="floorplan.html">Plan ↗</a>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ Site model — units are FEET, matching floorplan.html ============
// X = east, Z = south, Y = up. Origin = old plan datum (office N face = z14).
// Rev 7/12: north arch wall S face at z-2 (16' from office), ridge z11 (3' from office).
// Kitchen x8-18/z-2..9 (grade, 10×11), veranda ext x8.7-18/z9-14 (raised, 36\" stair in NW notch),
// office x0-10/z14-26 (raised 2', 9' walls), east room x10-18/z14-21 (open raised deck),
// new bath x10-18/z21-26 (raised, flush with the building south face),
// exist bath x22-26/z23-31. East fence x=26, south fence z=31, gate z18-22.

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9ec9e8);
scene.fog = new THREE.Fog(0x9ec9e8, 160, 320);

const camera = new THREE.PerspectiveCamera(46, 2, 0.5, 600);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI * 0.495;
controls.minDistance = 8; controls.maxDistance = 180;

// ---- Lights ----
const hemi = new THREE.HemisphereLight(0xcfe6ff, 0x8a7a5a, 1.25);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff2dd, 2.1);
sun.position.set(70, 80, 25); // morning sun from the east — hero light on the arches
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -70; sun.shadow.camera.right = 70;
sun.shadow.camera.top = 70; sun.shadow.camera.bottom = -70;
sun.shadow.bias = -0.0004;
scene.add(sun);

// ---- Procedural textures ----
function canvasTex(draw, w = 256, h = 256, rx = 1, ry = 1) {
  const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
  draw(cv.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(rx, ry);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const brickTex = (rx, ry) => canvasTex((g, w, h) => {
  g.fillStyle = '#8d4a3c'; g.fillRect(0, 0, w, h);
  const bw = 64, bh = 32;
  for (let y = 0; y < h / bh; y++) for (let x = -1; x < w / bw + 1; x++) {
    const off = (y % 2) * bw / 2;
    g.fillStyle = ['#94503f', '#85453a', '#9c5744', '#8a4a3b'][(x + y * 3) % 4];
    g.fillRect(x * bw + off + 2, y * bh + 2, bw - 4, bh - 4);
  }
}, 256, 256, rx, ry);
// White-washed brick — heavy white mortar with brick showing through (per site photos)
const brickWhiteTex = (rx, ry) => canvasTex((g, w, h) => {
  g.fillStyle = '#d9d2c4'; g.fillRect(0, 0, w, h);
  const bw = 64, bh = 32;
  for (let y = 0; y < h / bh; y++) for (let x = -1; x < w / bw + 1; x++) {
    const off = (y % 2) * bw / 2;
    g.fillStyle = ['#9c5744', '#a86050', '#8a4a3b', '#c9beb0'][(x * 5 + y * 3) % 4];
    g.globalAlpha = 0.85;
    g.fillRect(x * bw + off + 3, y * bh + 3, bw - 6, bh - 6);
    g.globalAlpha = 1;
  }
}, 256, 256, rx, ry);
const paverTex = (rx, ry) => canvasTex((g, w, h) => {
  g.fillStyle = '#caa789'; g.fillRect(0, 0, w, h);
  const bw = 42, bh = 21;
  for (let y = 0; y < h / bh; y++) for (let x = -1; x < w / bw + 1; x++) {
    const off = (y % 2) * bw / 2;
    g.fillStyle = ['#b06a4f', '#a4604a', '#b87356', '#9d5945'][(x * 7 + y) % 4];
    g.fillRect(x * bw + off + 1.5, y * bh + 1.5, bw - 3, bh - 3);
  }
}, 256, 256, rx, ry);
const lawnTex = (rx, ry) => canvasTex((g, w, h) => {
  g.fillStyle = '#4d9c44'; g.fillRect(0, 0, w, h);
  for (let i = 0; i < 900; i++) {
    g.fillStyle = ['#57a94d', '#448c3c', '#5fb254', '#3f8338'][i % 4];
    g.globalAlpha = 0.5;
    g.fillRect(Math.random() * w, Math.random() * h, 3, 3);
  }
}, 256, 256, rx, ry);

// ---- Materials ----
const M = {
  stucco: new THREE.MeshStandardMaterial({ color: 0xf0ebde, roughness: 0.95 }),
  stuccoWhite: new THREE.MeshStandardMaterial({ color: 0xf7f3ea, roughness: 0.95 }),
  brick: new THREE.MeshStandardMaterial({ map: brickTex(2, 2), roughness: 0.9 }),
  brickWhite: new THREE.MeshStandardMaterial({ map: brickWhiteTex(2, 2), roughness: 0.92 }),
  roof: new THREE.MeshStandardMaterial({ color: 0x39404a, roughness: 0.55, metalness: 0.35 }),
  wood: new THREE.MeshStandardMaterial({ color: 0x8f6742, roughness: 0.8 }),
  woodDark: new THREE.MeshStandardMaterial({ color: 0x6e4d2f, roughness: 0.85 }),
  glass: new THREE.MeshStandardMaterial({ color: 0xdceefa, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.16, depthWrite: false, side: THREE.DoubleSide }),
  trim: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 }),
  fence: new THREE.MeshStandardMaterial({ color: 0xeef1f4, roughness: 0.7 }),
  water: new THREE.MeshStandardMaterial({ color: 0x3fb3dd, roughness: 0.05, metalness: 0.2 }),
  spaShell: new THREE.MeshStandardMaterial({ color: 0x5a6672, roughness: 0.5 }),
  cushion: new THREE.MeshStandardMaterial({ color: 0xe8e0cd, roughness: 0.9 }),
  soil: new THREE.MeshStandardMaterial({ color: 0x6b5138, roughness: 1 }),
  leaf: new THREE.MeshStandardMaterial({ color: 0x3e7d3a, roughness: 0.9 }),
  leafDark: new THREE.MeshStandardMaterial({ color: 0x2f6330, roughness: 0.9 }),
  succulent: new THREE.MeshStandardMaterial({ color: 0x7a4f52, roughness: 0.85 }),
  concrete: new THREE.MeshStandardMaterial({ color: 0xb9b3a6, roughness: 0.95 }),
};

function box(w, h, d, mat, x, y, z, group) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); m.castShadow = m.receiveShadow = true;
  (group || scene).add(m); return m;
}

// ---- Ground ----
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x9a8a6c, roughness: 1 }));
ground.rotation.x = -Math.PI / 2; ground.position.set(0, -0.05, 0);
ground.receiveShadow = true; scene.add(ground);

// Brick paver patio — existing, kept ("neater"): west + north zones
function pad(x1, z1, x2, z2, tex, y = 0.02) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(x2 - x1, z2 - z1),
    new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 }));
  m.rotation.x = -Math.PI / 2;
  m.position.set((x1 + x2) / 2, y, (z1 + z2) / 2);
  m.receiveShadow = true; scene.add(m); return m;
}
pad(-26, 0, 8, 31, paverTex(9, 8));          // west patio (lean-to, pergola zone)
pad(0, -2, 8, 14, paverTex(2.5, 4));         // open north patio remainder
pad(-26, -8, 8, -2, paverTex(9, 2));         // north patio run
pad(8, -9, 19, -4, paverTex(3, 2.5));        // covered porch north of the arch wall (under roof overhang)
// Lush lawn — east yard, building to fence
pad(18, 0, 26, 31, lawnTex(3, 8), 0.03);

// ============ BUILDING ============
const B = new THREE.Group(); scene.add(B);
const RF = 2;             // raised floor height (office/east room/bath)
const WALL = 8;           // wall height above raised floor
const KW = 11.5;          // kitchen wall height from grade (office walls are 9' over the 2' raised floor)

// --- Raised plinth under office + east room + new bath (z14-26) ---
box(18, RF, 12, M.concrete, 9, RF / 2, 20, B);
// --- Veranda extension — FINAL 7/12 (corrected): clear width wall-face to wall-face
//     x8.7-17.5 = 8'-10" × 5'-0" deep (z9-14, 2' past the ridge). 36" stair fully
//     encompassed at the NW corner rising SOUTH: two treads in the notch, deck = third step. ---
box(8.8, RF, 3, M.concrete, 13.1, RF / 2, 12.5, B);    // main deck, z11-14
box(5.8, RF, 2, M.concrete, 14.6, RF / 2, 10, B);      // deck east of the stair notch, z9-11
box(3, 0.67, 1, M.concrete, 10.2, 0.335, 9.5, B);      // tread +8"  (z9-10)
box(3, 1.33, 1, M.concrete, 10.2, 0.665, 10.5, B);     // tread +16" (z10-11)

// --- Office core (x0-10, z14-26) — 9' walls over the raised floor, hollow so the
//     roof-off toggle reveals the interior. Walls have REAL openings cut for the
//     windows/doors so the clear glazing sees through (rev 7/12). ---
{
  let w;
  // west wall (x0-0.5) — double-hung opening
  w = panelWall(12, 9, [{ x: 7.4, y: 1.9, w: 2.2, h: 3.5 }], 0.5, M.stucco);
  w.rotation.y = Math.PI / 2; w.position.set(0, RF, 26); B.add(w);
  // east wall (x9.5-10) — 6' french-door opening
  w = panelWall(12, 9, [{ x: 3, y: 0, w: 6, h: 6.4 }], 0.5, M.stucco);
  w.rotation.y = Math.PI / 2; w.position.set(9.5, RF, 26); B.add(w);
  // north wall (z14-14.5) — centered 6×3 window opening
  w = panelWall(10, 9, [{ x: 2, y: 2.7, w: 6, h: 3 }], 0.5, M.stucco);
  w.position.set(0, RF, 14); B.add(w);
  // south wall (z25.5-26) — clerestory pair openings
  w = panelWall(10, 9, [{ x: 2.85, y: 7.45, w: 1.5, h: 0.9 }, { x: 5.65, y: 7.45, w: 1.5, h: 0.9 }], 0.5, M.stucco);
  w.position.set(0, RF, 25.5); B.add(w);
}
box(4.5, 0.18, 1.9, M.wood, 3.2, 4.5, 15.6, B);     // desk under the transfer window
box(1.4, 1.4, 1.4, M.cushion, 3.2, 2.7, 17.3, B);   // chair
// --- East room (x10-18, z14-21): open raised veranda flowing into the z11-14 extension.
//     West enclosure = office east wall; south enclosure = new bath mass.
// --- New bath (x10-18, z21-26) — 8×5, flush with the building's south face.
//     Hollow walls so the roof-off toggle reveals the interior. ---
{
  let w;
  // north wall (door wall, z21-21.5) — door opening; stops at the arcade INNER face
  // (x17.5, 7'-6" long) so it can't poke into the south arch (fix 7/18)
  w = panelWall(7.5, 9, [{ x: 0.95, y: 0, w: 2.5, h: 6.4 }], 0.5, M.stucco);
  w.position.set(10, RF, 21); B.add(w);
  // south wall (z25.5-26) — frosted window opening; same 7'-6" trim
  w = panelWall(7.5, 9, [{ x: 2.95, y: 3.75, w: 2.1, h: 1.7 }], 0.5, M.stucco);
  w.position.set(10, RF, 25.5); B.add(w);
}
box(0.5, 9, 4, M.stucco, 10.25, RF + 4.5, 23.5, B);  // west wall (shared with office side)
box(0.5, 9, 4, M.stucco, 17.25, RF + 4.5, 23.5, B);  // east wall (inside the arcade line)
box(3, 0.18, 3.2, M.trim, 12.1, 2.1, 23.6, B);       // shower pan, west end
box(0.1, 6, 3.2, M.glass, 13.6, 5, 23.6, B);         // shower glass
box(1.3, 1.4, 1.7, M.trim, 14.9, 2.7, 24.8, B);      // toilet
box(2.3, 2.5, 1.7, M.woodDark, 16, 3.25, 22.4, B);   // vanity

// --- Kitchen zone (x8-18, z-2..11, grade, north wall to ridge, under the main roof) ---
box(0.7, KW, 13, M.stucco, 8.35, KW / 2, 4.5, B);       // west wall (partition to open patio)
// Kitchen interior: floor slab; west wall = countertop run + counter-depth fridge; dinette at south
const steel = new THREE.MeshStandardMaterial({ color: 0xc6cdd4, roughness: 0.35, metalness: 0.7 });
box(9.4, 0.12, 10.8, M.concrete, 13.3, 0.06, 3.5, B);   // floor slab (north wall to veranda edge, 11')
// (south countertop run removed 7/12 — sink counter at the north arch window remains)
box(2.2, 5.9, 3, steel, 9.85, 2.95, 3.3, B);             // counter-depth fridge, west wall north end, facing east
// NW counter — fills the west wall between the fridge and the north wall
box(2, 3, 3.8, M.woodDark, 9.75, 1.5, -0.1, B);
box(2, 0.18, 3.8, M.trim, 9.75, 3.1, -0.1, B);
// NE peninsula — pushed against the east wall: standard-depth counter, projecting 30" south
box(2.1, 3, 2.5, M.woodDark, 16.45, 1.5, -0.75, B);
box(2.1, 0.18, 2.6, M.trim, 16.45, 3.1, -0.7, B);
// Small dinette beneath the veranda rail (south end of the kitchen, at the ridge line)
{
  // Dinette — moved UP onto the veranda (NE of the stair, at the rail overlooking the kitchen)
  const tTop = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.14, 20), M.wood);
  tTop.position.set(15.4, 4.45, 11); tTop.castShadow = true; scene.add(tTop);
  const tPed = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.3, 2.4, 10), M.woodDark);
  tPed.position.set(15.4, 3.2, 11); tPed.castShadow = true; scene.add(tPed);
  for (const [cx, cz] of [[13.8, 11], [17, 11], [15.4, 12.6]]) {
    box(1.1, 1.5, 1.1, M.cushion, cx, 2.8, cz, B);
  }
}

// ============ NORTH WALL — the existing two-arch wall (2' thick, heavy brick pillars) ============
// Rev 7/12: south face at z-2 (16' from office). Spans x0-18, z-2 to -4.
const NWALL = new THREE.Group(); scene.add(NWALL);
{
  // Arches are completely stucco; brick pillars rise only to the spring line.
  // Proportions calibrated from IMG_2642 (wall = 11'): spring 8', flat segmental rise 1.3', apex 9.3'
  const aw = archWall(18, 11, [{ c: 5, w: 6, h: 9.3, ry: 1.3 }, { c: 13, w: 6, h: 9.3, ry: 1.3 }], 2, M.stuccoWhite);
  aw.position.set(0, 0, -4); NWALL.add(aw);   // extrudes z -4 → -2
  box(2.3, 8, 2.3, M.brickWhite, 9, 4, -3, NWALL);        // center pillar — brick to spring line (8')
  box(2.3, 8, 2.3, M.brickWhite, 17, 4, -3, NWALL);       // NE pillar
  box(2.3, 8, 2.3, M.brickWhite, 1, 4, -3, NWALL);   // NW pillar — brick stops at the spring line like the others
  // Concealed flue pipe from the fireplace dome up through the roof (only the stub shows above)
  {
    const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 8.4, 12),
      new THREE.MeshStandardMaterial({ color: 0x3a3f45, roughness: 0.5, metalness: 0.6 }));
    pipe.position.set(1, 9.2, -3); pipe.castShadow = true; NWALL.add(pipe);
    const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.25, 12),
      new THREE.MeshStandardMaterial({ color: 0x2c3036, roughness: 0.5, metalness: 0.6 }));
    cap.position.set(1, 13.5, -3); NWALL.add(cap);
  }
}
// East arch = arched window over the kitchen sink (arch kept, glazed at the outer wall face)
box(5.6, 9, 0.25, M.glass, 13, 4.6, -3.75);
// Spa — OUTSIDE, on the north porch, tight to the wall in front of the east arch
box(6, 3, 6, M.spaShell, 13, 1.5, -7.3);
{
  const w = new THREE.Mesh(new THREE.PlaneGeometry(5.4, 5.4), M.water);
  w.rotation.x = -Math.PI / 2; w.position.set(13, 3.05, -7.3); w.receiveShadow = true; scene.add(w);
  box(3, 1, 1.4, M.wood, 13, 0.5, -10.9);      // step, north side
}
// Kitchen sink counter — starts at the middle of the north wall (center pillar), runs the
// eastern arch, and continues to the east wall where it meets the peninsula (L-shape)
box(8.5, 3, 2, M.woodDark, 13.25, 1.5, -2.55);
box(8.5, 0.18, 2.2, M.trim, 13.25, 3.1, -2.5);
box(1.8, 0.3, 1.2, new THREE.MeshStandardMaterial({ color: 0xb9c2ca, roughness: 0.3, metalness: 0.6 }), 13, 3.22, -2.6);  // sink
box(0.12, 0.9, 0.12, M.spaShell, 13.7, 3.6, -2.6);  // faucet
// Fireplace — brick baldachin per photos: four corner piers, an arched opening in each
// face, low cap, shallow white-washed brick dome. Set at 45°, dome under the chimney.
const F = new THREE.Group(); F.position.set(1, 0, -3); F.rotation.y = Math.PI / 4; scene.add(F);
{
  box(5, 0.5, 5, M.brickWhite, 0, 0.25, 0, F);                    // base slab
  for (const [px, pz] of [[-1.9, -1.9], [1.9, -1.9], [-1.9, 1.9], [1.9, 1.9]]) {
    box(1.2, 3.9, 1.2, M.brickWhite, px, 2.2, pz, F);             // corner piers
  }
  // Arched face panels — one per side, openings you can see through
  const face = () => archWall(5, 4.2, [{ c: 2.5, w: 2.4, h: 3.6 }], 0.4, M.brickWhite);
  let p;
  p = face(); p.position.set(-2.5, 0.4, 2.1); F.add(p);                            // south face
  p = face(); p.position.set(-2.5, 0.4, -2.5); F.add(p);                           // north face
  p = face(); p.rotation.y = Math.PI / 2; p.position.set(-2.5, 0.4, 2.5); F.add(p); // west face
  p = face(); p.rotation.y = Math.PI / 2; p.position.set(2.1, 0.4, 2.5); F.add(p);  // east face
  box(4.6, 0.5, 4.6, M.brickWhite, 0, 4.85, 0, F);                // cap over the arches
  const dome = new THREE.Mesh(new THREE.SphereGeometry(2.05, 20, 14, 0, Math.PI * 2, 0, Math.PI / 2), M.brickWhite);
  dome.position.set(0, 5.1, 0); dome.castShadow = true; F.add(dome);
  box(1.5, 1.1, 1.5, new THREE.MeshStandardMaterial({ color: 0x1c120c, roughness: 1 }), 0, 1.0, 0, F);  // firebox
}

// ============ EAST ARCADE — NEW: regular-thickness wall, arches span pillar to pillar ============
// Wall x17.5-18 (6", outer face on the building line). Heavy 2'+ brick pillars at ridge,
// south end, and NE corner; arches spring from the pillar tops (y4.4) and fill the full bays.
const EARC = new THREE.Group(); scene.add(EARC);
{
  const aw = archWall(29, 11, [
    { c: 24.33, w: 7, h: 9.3, ry: 1.3 },  // north bay (ENTRY)
    { c: 15, w: 7, h: 9.3, ry: 1.3 },     // middle bay
    { c: 5.67, w: 7, h: 9.3, ry: 1.3 },   // south bay
  ], 0.5, M.stuccoWhite);
  aw.rotation.y = Math.PI / 2;     // local X 0→29 maps to global z 26→-3; depth → +X (x17.5-18)
  aw.position.set(17.5, 0, 26);
  EARC.add(aw);
  // Pillar FACADES only (rev 7/12) — brick pilaster faces applied to the wall for effect;

// Arch-wall builder — arches cut from a stucco panel. Semicircular by default;
// pass a.ry for a low elliptical (segmental) arch: rise ry over span w, top at a.h.
// Flat wall panel with rectangular openings cut out (windows/doors) — same idiom as archWall.
function panelWall(len, height, holes, depth, mat) {
  const s = new THREE.Shape();
  s.moveTo(0, 0); s.lineTo(len, 0); s.lineTo(len, height); s.lineTo(0, height); s.lineTo(0, 0);
  for (const o of holes) {
    const h = new THREE.Path();
    h.moveTo(o.x, o.y); h.lineTo(o.x + o.w, o.y);
    h.lineTo(o.x + o.w, o.y + o.h); h.lineTo(o.x, o.y + o.h); h.lineTo(o.x, o.y);
    s.holes.push(h);
  }
  const g = new THREE.ExtrudeGeometry(s, { depth, bevelEnabled: false });
  const m = new THREE.Mesh(g, mat);
  m.castShadow = m.receiveShadow = true;
  return m;
}

function archWall(len, height, arches, depth, mat) {
  const s = new THREE.Shape();
  s.moveTo(0, 0); s.lineTo(len, 0); s.lineTo(len, height); s.lineTo(0, height); s.lineTo(0, 0);
  for (const a of arches) {
    const h = new THREE.Path();
    const r = a.w / 2, ry = a.ry || r, spring = a.h - ry;
    h.moveTo(a.c - r, 0);
    h.lineTo(a.c - r, spring);
    h.absellipse(a.c, spring, r, ry, Math.PI, 0, true);
    h.lineTo(a.c + r, 0);
    h.lineTo(a.c - r, 0);
    s.holes.push(h);
  }
  const g = new THREE.ExtrudeGeometry(s, { depth, bevelEnabled: false });
  const m = new THREE.Mesh(g, mat);
  m.castShadow = m.receiveShadow = true;
  return m;
}

function fenceRun(x1, z1, x2, z2) {
  const g = new THREE.Group();
  const len = Math.hypot(x2 - x1, z2 - z1);
  g.position.set(x1, 0, z1);
  g.rotation.y = -Math.atan2(z2 - z1, x2 - x1);

  for (let d = 0; d <= len; d += 8) box(0.5, 6.3, 0.5, M.fence, Math.min(d, len), 3.15, 0, g);
  FENCE.add(g); return g;
}

box(0.4, 5.9, 4, M.trim, 26, 2.95, 20, FENCE).material = new THREE.MeshStandardMaterial({ color: 0xdde3e8, roughness: 0.6 });
FENCE.visible = false;      // hidden by default — toggle with the Fence button

// ============ LANDSCAPE (existing — kept) ============
function tree(x, z, trunkH, r, mat) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const t = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.4, trunkH, 8), M.woodDark);
  t.position.y = trunkH / 2; t.castShadow = true; g.add(t);
  for (let i = 0; i < 3; i++) {
    const c = new THREE.Mesh(new THREE.SphereGeometry(r * (1 - i * 0.18), 12, 10), i ? M.leaf : mat);
    c.position.set((Math.random() - 0.5) * r, trunkH + r * 0.55 + i * r * 0.4, (Math.random() - 0.5) * r);
    c.castShadow = true; g.add(c);
  }
  scene.add(g); return g;
}
tree(24, 3, 4, 2.6, M.leafDark);        // pomegranate in the new lawn (NE corner)
tree(-23.5, 28.5, 9, 2.6, M.leaf);      // palm-ish corner tree
tree(-22, 3, 5, 3.6, M.leafDark);       // shade tree, NW patio corner
// Succulent bed along south fence (aeoniums from photos)
for (let i = 0; i < 9; i++) {
  const s = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.8, 9), i % 3 ? M.succulent : M.leaf);
  s.position.set(-21 + i * 2.1, 0.4, 29.6); s.castShadow = true; scene.add(s);
}
// Shrubs along east fence in the lawn
for (let i = 0; i < 5; i++) {
  const s = new THREE.Mesh(new THREE.SphereGeometry(0.8, 10, 8), M.leaf);
  s.position.set(25, 0.8, 2 + i * 5.4); s.castShadow = true; scene.add(s);
}

// ============ CAMERA PRESETS ============
const VIEWS = {
  aerial:  { pos: [58, 54, 62],  tgt: [3, 2, 8] },
  east:    { pos: [24.5, 6, 22], tgt: [16, 7, 2] },
  west:    { pos: [-12, 6.5, -2], tgt: [8, 5, 6] },
  kitchen: { pos: [24, 5.5, 13], tgt: [10, 4, 6] },
  spa:     { pos: [9, 5.5, -18], tgt: [9, 5.5, 2] },
};
let anim = null;
function goTo(name) {
  const v = VIEWS[name];
  const p0 = camera.position.clone(), t0 = controls.target.clone();
  const p1 = new THREE.Vector3(...v.pos), t1 = new THREE.Vector3(...v.tgt);
  const start = performance.now(), dur = 900;
  anim = (now) => {
    let k = Math.min(1, (now - start) / dur);
    k = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;
    camera.position.lerpVectors(p0, p1, k);
    controls.target.lerpVectors(t0, t1, k);
    if (k >= 1) anim = null;
  };
  document.querySelectorAll('#views button[data-v]').forEach(b =>
    b.classList.toggle('active', b.dataset.v === name));
}
document.querySelectorAll('#views button[data-v]').forEach(b =>
  b.addEventListener('click', () => goTo(b.dataset.v)));
camera.position.set(...VIEWS.aerial.pos);
controls.target.set(...VIEWS.aerial.tgt);

// Kitchen east side: closed (glazed arch) ⇄ open — owner is comparing both
const kbtn = document.getElementById('btn-kmode');
let kClosed = true;
KCLOSED.visible = kClosed;
kbtn.addEventListener('click', () => {
  kClosed = !kClosed;
  KCLOSED.visible = kClosed;
  kbtn.textContent = kClosed ? 'Kitchen: Closed' : 'Kitchen: Open';
});

// Roof on/off — lift the lid to read the floor plan from above
const rbtn = document.getElementById('btn-roof');
let roofOn = true;
rbtn.addEventListener('click', () => {
  roofOn = !roofOn;
  ROOF.visible = roofOn;
  rbtn.textContent = roofOn ? 'Roof: On' : 'Roof: Off';
});

// Fence on/off — hidden by default so exterior views stay open
const fbtn = document.getElementById('btn-fence');
let fenceOn = false;
fbtn.addEventListener('click', () => {
  fenceOn = !fenceOn;
  FENCE.visible = fenceOn;
  fbtn.textContent = fenceOn ? 'Fence: On' : 'Fence: Off';
});

// ---- Render loop ----
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  }
}
window.__p = { camera, controls, sun, scene };   // dev handle for headless preview shots
renderer.setAnimationLoop((now) => {
  resize();
  if (anim) anim(now);
  controls.update();
  renderer.render(scene, camera);
});
</script>
